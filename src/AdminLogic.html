<script>
/**
 * AdminLogic — logic murni halaman config (CLIENT-side, tanpa DOM).
 * Di-unit-test di Node lewat test/helpers/loadHtmlScript.js.
 * Validasi di sini cuma UX cepat — server (ConfigLogic/RuleEvaluator) tetap
 * memvalidasi ulang SEMUA input di tiap panggilan.
 */
var AdminLogic = (function () {
  /**
   * Parse textarea options gaya kolom `kategori` sheet asli:
   * satu opsi per baris, format "1. Label" (titik boleh ")" atau tanpa).
   * Kode boleh diikuti huruf (mis. "1a", "1b") untuk sub-kategori — kode
   * angka-murni disimpan sebagai Number (kompatibel rule lama), kode
   * ber-huruf disimpan sebagai String.
   * → { ok, options: [{value, label}] } | { ok:false, error }
   */
  function parseOptionsText(text) {
    var lines = String(text == null ? '' : text).split('\n')
      .map(function (l) { return l.trim(); })
      .filter(function (l) { return l !== ''; });
    if (!lines.length) return { ok: false, error: 'Opsi kosong — isi satu opsi per baris, format "1. Label".' };
    var options = [];
    for (var i = 0; i < lines.length; i++) {
      var m = lines[i].match(/^([0-9]+[a-zA-Z]*)\s*[.)]?\s+(.+)$/);
      if (!m) return { ok: false, error: 'Baris ' + (i + 1) + ' tidak sesuai format "kode. label" (kode angka, boleh diakhiri huruf mis. "1a"): "' + lines[i] + '"' };
      var code = m[1];
      options.push({ value: /^[0-9]+$/.test(code) ? Number(code) : code, label: m[2].trim() });
    }
    return { ok: true, options: options };
  }

  function optionsToText(options) {
    return (options || []).map(function (o) { return o.value + '. ' + o.label; }).join('\n');
  }

  /**
   * Rakit `when` 1-kondisi dari Mode Sederhana.
   * @param fieldMeta {type} dari getRuleFieldOptions — menentukan koersi value.
   */
  function buildSimpleWhen(fieldId, op, rawValue, fieldMeta) {
    if (!fieldId) return { ok: false, error: 'Pilih field dulu.' };
    if (op === 'empty' || op === 'not_empty') {
      return { ok: true, when: { field: fieldId, op: op } };
    }
    var raw = String(rawValue == null ? '' : rawValue).trim();
    if (raw === '') return { ok: false, error: 'Value belum diisi.' };
    var numeric = fieldMeta && (fieldMeta.type === 'number' || fieldMeta.type === 'currency' || fieldMeta.type === 'select');

    if (op === 'in' || op === 'not_in') {
      var items = raw.split(',').map(function (v) { return v.trim(); }).filter(function (v) { return v !== ''; });
      if (!items.length) return { ok: false, error: 'Isi daftar value dipisah koma, mis. 1, 2, 3.' };
      var values = items.map(function (v) { return numeric && !isNaN(Number(v)) ? Number(v) : v; });
      return { ok: true, when: { field: fieldId, op: op, value: values } };
    }
    if (op === 'regex') {
      try { new RegExp(raw); } catch (e) { return { ok: false, error: 'Pola regex tidak valid.' }; }
      return { ok: true, when: { field: fieldId, op: op, value: raw } };
    }
    var isCmp = op === '>' || op === '>=' || op === '<' || op === '<=';
    if (isCmp && isNaN(Number(raw))) return { ok: false, error: 'Operator ' + op + ' butuh value angka.' };
    var value = (numeric || isCmp) && !isNaN(Number(raw)) ? Number(raw) : raw;
    return { ok: true, when: { field: fieldId, op: op, value: value } };
  }

  /** Mode Lanjutan: parse + cek dasar; struktur detail divalidasi server. */
  function parseAdvancedWhen(text) {
    var parsed;
    try {
      parsed = JSON.parse(text);
    } catch (e) {
      return { ok: false, error: 'JSON tidak valid: ' + e.message };
    }
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      return { ok: false, error: 'Kondisi harus objek JSON (bukan array/primitif).' };
    }
    return { ok: true, when: parsed };
  }

  /** Geser item list (tombol ↑/↓). Kembalikan array BARU; di luar batas = apa adanya. */
  function moveItem(arr, index, delta) {
    var to = index + delta;
    if (index < 0 || index >= arr.length || to < 0 || to >= arr.length) return arr.slice();
    var copy = arr.slice();
    var tmp = copy[index];
    copy[index] = copy[to];
    copy[to] = tmp;
    return copy;
  }

  /**
   * Pindah item dari posisi `from` ke posisi `to` (untuk drag & drop, di mana
   * jarak pindah bisa lebih dari 1). Kembalikan array BARU; `to` dijepit ke
   * rentang valid; `from` di luar batas = array apa adanya.
   */
  function moveToIndex(arr, from, to) {
    var copy = (arr || []).slice();
    if (from < 0 || from >= copy.length) return copy;
    if (to < 0) to = 0;
    if (to >= copy.length) to = copy.length - 1;
    if (from === to) return copy;
    var item = copy.splice(from, 1)[0];
    copy.splice(to, 0, item);
    return copy;
  }

  // ==== RULE MODE SEDERHANA: banyak kondisi + gabungan DAN/ATAU ====
  // Operator yang boleh membandingkan antar-field (field2). in/not_in/regex/
  // empty/not_empty TIDAK relevan untuk perbandingan dua field.
  var CMP_OPS = ['==', '!=', '>', '>=', '<', '<='];
  // Semua operator leaf yang bisa dibangun/ dibuka lewat Mode Sederhana.
  var SIMPLE_LEAF_OPS = ['==', '!=', '>', '>=', '<', '<=', 'in', 'not_in', 'empty', 'not_empty', 'regex'];

  /**
   * Rakit SATU leaf kondisi dari satu baris Mode Sederhana.
   * @param cond {field, op, compare:'value'|'field', value, field2}
   * @param fieldMeta {type} field utama — koersi value untuk compare='value'.
   */
  function buildLeaf(cond, fieldMeta) {
    cond = cond || {};
    var field = cond.field;
    if (!field) return { ok: false, error: 'Pilih field dulu.' };
    var op = cond.op;
    if (op === 'empty' || op === 'not_empty') {
      return { ok: true, when: { field: field, op: op } };
    }
    if (cond.compare === 'field') {
      if (CMP_OPS.indexOf(op) === -1) {
        return { ok: false, error: 'Bandingkan antar-field hanya untuk operator ==, !=, >, >=, <, <=.' };
      }
      if (!cond.field2) return { ok: false, error: 'Pilih field pembanding.' };
      if (cond.field2 === field) return { ok: false, error: 'Field pembanding harus berbeda dari field utama.' };
      return { ok: true, when: { field: field, op: op, field2: cond.field2 } };
    }
    // compare='value' → koersi lewat buildSimpleWhen (sumber kebenaran tunggal).
    return buildSimpleWhen(field, op, cond.value, fieldMeta);
  }

  /**
   * Gabungkan beberapa kondisi jadi satu `when`.
   * @param combinator 'all' (DAN) | 'any' (ATAU).
   * @param conditions array baris kondisi.
   * @param metaOf fungsi (fieldId) → fieldMeta|null (menjaga fungsi ini murni).
   * 1 kondisi → leaf polos (tanpa pembungkus) supaya kompatibel dgn rule lama;
   * ≥2 kondisi → { all:[...] } / { any:[...] }.
   */
  function buildSimpleGroup(combinator, conditions, metaOf) {
    combinator = combinator === 'any' ? 'any' : 'all';
    if (!conditions || !conditions.length) return { ok: false, error: 'Tambahkan minimal 1 kondisi.' };
    var leaves = [];
    for (var i = 0; i < conditions.length; i++) {
      var meta = metaOf ? metaOf(conditions[i].field) : (conditions[i].fieldMeta || null);
      var r = buildLeaf(conditions[i], meta);
      if (!r.ok) return { ok: false, error: 'Kondisi ' + (i + 1) + ': ' + r.error, index: i };
      leaves.push(r.when);
    }
    if (leaves.length === 1) return { ok: true, when: leaves[0] };
    var when = {};
    when[combinator] = leaves;
    return { ok: true, when: when };
  }

  // Ubah satu leaf `when` → baris kondisi Mode Sederhana, atau null kalau leaf
  // itu tidak bisa dibuka di Mode Sederhana (nested/roster/op tak didukung/
  // field tak dikenal). isKnownField menyaring field yang tak ada di dropdown.
  function leafToCond(leaf, isKnownField) {
    if (!leaf || typeof leaf !== 'object' || Array.isArray(leaf)) return null;
    if ('all' in leaf || 'any' in leaf ||
        'roster_any' in leaf || 'roster_all' in leaf || 'roster_count' in leaf) return null;
    if (typeof leaf.field !== 'string' || !leaf.field) return null;
    if (isKnownField && !isKnownField(leaf.field)) return null;
    if (SIMPLE_LEAF_OPS.indexOf(leaf.op) === -1) return null;
    var cond = { field: leaf.field, op: leaf.op, compare: 'value', value: '', field2: '' };
    if (leaf.op === 'empty' || leaf.op === 'not_empty') return cond;
    if ('field2' in leaf) {
      if (CMP_OPS.indexOf(leaf.op) === -1) return null;
      if (typeof leaf.field2 !== 'string' || !leaf.field2) return null;
      if (isKnownField && !isKnownField(leaf.field2)) return null;
      cond.compare = 'field';
      cond.field2 = leaf.field2;
      return cond;
    }
    if (!('value' in leaf)) return null;
    cond.value = leaf.value;
    return cond;
  }

  /**
   * Balikan buildSimpleGroup: apakah `when` bisa disunting di Mode Sederhana?
   * → { simple:true, combinator, conditions:[...] } | { simple:false }.
   * "simple" = leaf polos ATAU all/any berisi HANYA leaf-leaf polos yang
   * seluruh field-nya dikenal. Selain itu jatuh ke Mode Lanjutan (JSON).
   */
  function classifySimpleGroup(when, isKnownField) {
    if (!when || typeof when !== 'object' || Array.isArray(when)) return { simple: false };
    var combinator, arr;
    if (Array.isArray(when.all)) { combinator = 'all'; arr = when.all; }
    else if (Array.isArray(when.any)) { combinator = 'any'; arr = when.any; }
    else {
      var single = leafToCond(when, isKnownField);
      if (!single) return { simple: false };
      return { simple: true, combinator: 'all', conditions: [single] };
    }
    if (!arr.length) return { simple: false };
    var conds = [];
    for (var i = 0; i < arr.length; i++) {
      var c = leafToCond(arr[i], isKnownField);
      if (!c) return { simple: false };
      conds.push(c);
    }
    return { simple: true, combinator: combinator, conditions: conds };
  }

  /**
   * Template contoh jawaban untuk panel Preview: field datar kosong + tiap
   * grup roster satu baris kosong — admin tinggal mengisi nilai.
   */
  function buildAnswersTemplate(questions) {
    var answers = {};
    var roster = {};
    (questions || []).forEach(function (q) {
      if (q.roster_group) {
        if (!roster[q.roster_group]) roster[q.roster_group] = [{}];
        roster[q.roster_group][0][q.question_id] = '';
      } else {
        answers[q.question_id] = '';
      }
    });
    if (Object.keys(roster).length) answers.roster = roster;
    return answers;
  }

  return {
    parseOptionsText: parseOptionsText,
    optionsToText: optionsToText,
    buildSimpleWhen: buildSimpleWhen,
    parseAdvancedWhen: parseAdvancedWhen,
    moveItem: moveItem,
    moveToIndex: moveToIndex,
    buildLeaf: buildLeaf,
    buildSimpleGroup: buildSimpleGroup,
    classifySimpleGroup: classifySimpleGroup,
    buildAnswersTemplate: buildAnswersTemplate,
    CMP_OPS: CMP_OPS
  };
})();

if (typeof module !== 'undefined' && module.exports) {
  module.exports = AdminLogic;
}
</script>
