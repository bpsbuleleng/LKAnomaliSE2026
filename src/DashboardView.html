<section id="view-dashboard" data-testid="dashboard-view" class="view hidden max-w-md lg:max-w-4xl mx-auto px-3 py-4 sm:px-4 sm:py-6">
  <div class="flex items-center justify-between gap-2 mb-1">
    <!-- "Lembar Kerja" (bukan "Dashboard") — sebutan Dashboard sekarang milik
         halaman awal visualisasi (view-viz). -->
    <h1 class="text-lg font-bold">Lembar Kerja</h1>
    <div class="flex items-center gap-1.5">
      <button id="open-viz-btn" data-testid="open-viz-btn" type="button"
        class="h-11 px-4 rounded-xl border border-slate-300 text-sm font-medium text-slate-700 active:bg-slate-50">
        Dashboard
      </button>
      <button id="logout-btn" data-testid="logout-btn" type="button"
        class="h-11 px-4 rounded-xl border border-slate-300 text-sm font-medium text-slate-700 active:bg-slate-50">
        Keluar
      </button>
    </div>
  </div>
  <p id="dashboard-greeting" data-testid="dashboard-greeting" class="text-sm text-slate-500 mb-3"></p>

  <button id="new-record-btn" data-testid="new-record-btn" type="button"
    class="w-full h-12 rounded-xl bg-orange-600 text-white text-base font-semibold active:bg-orange-700 mb-4">
    + Buat Record
  </button>

  <!-- Filter daftar record — semua opsi (kecuali Status) diisi dinamis dari
       record yang termuat, jadi cuma menampilkan pilihan yang relevan. -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
    <select id="filter-status" data-testid="filter-status"
      class="h-11 px-3 text-sm rounded-xl border border-slate-300 bg-white">
      <option value="">Semua Status</option>
      <option value="draft">Draft</option>
      <option value="submitted">Submitted</option>
    </select>
    <select id="filter-wilayah" data-testid="filter-wilayah"
      class="h-11 px-3 text-sm rounded-xl border border-slate-300 bg-white">
      <option value="">Semua Wilayah</option>
    </select>
    <select id="filter-anomali" data-testid="filter-anomali"
      class="h-11 px-3 text-sm rounded-xl border border-slate-300 bg-white">
      <option value="">Semua Anomali</option>
      <option value="__none__">Tidak ada anomali</option>
    </select>
    <select id="filter-ppl" data-testid="filter-ppl"
      class="h-11 px-3 text-sm rounded-xl border border-slate-300 bg-white">
      <option value="">Semua PPL</option>
    </select>
  </div>

  <div id="record-list" data-testid="record-list" class="space-y-2 lg:space-y-0 lg:grid lg:grid-cols-2 xl:grid-cols-3 lg:gap-3"></div>
  <p id="record-filtered-empty" data-testid="record-filtered-empty" class="hidden text-sm text-slate-400 text-center py-6">
    Tidak ada record yang cocok dengan filter.
  </p>
  <!-- Skeleton kartu selagi daftar record dimuat -->
  <div id="record-loading" class="hidden space-y-2" aria-hidden="true">
    <div class="skel h-[4.5rem] rounded-xl"></div>
    <div class="skel h-[4.5rem] rounded-xl"></div>
    <div class="skel h-[4.5rem] rounded-xl"></div>
  </div>
  <p id="record-empty" data-testid="record-empty" class="hidden text-sm text-slate-400 text-center py-6">
    Belum ada record. Mulai dengan "Buat Record".
  </p>

  <!-- Dialog pilih jenis assignment untuk record baru -->
  <div id="jenis-dialog" data-testid="jenis-dialog"
    class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/40">
    <div class="dlg-panel bg-white w-full max-w-md rounded-2xl p-5 space-y-3">
      <h2 class="font-bold text-lg">Buat record baru</h2>
      <p class="text-sm text-slate-500">Pilih jenis assignment:</p>
      <button id="new-usaha" data-testid="new-usaha" type="button"
        class="w-full h-12 rounded-xl bg-indigo-600 text-white font-semibold active:bg-indigo-700">Usaha</button>
      <button id="new-keluarga" data-testid="new-keluarga" type="button"
        class="w-full h-12 rounded-xl bg-teal-600 text-white font-semibold active:bg-teal-700">Keluarga</button>
      <button id="jenis-cancel" data-testid="jenis-cancel" type="button"
        class="w-full h-12 rounded-xl border border-slate-300 font-medium active:bg-slate-50">Batal</button>
    </div>
  </div>
</section>
