<section id="view-dashboard" data-testid="dashboard-view" class="view hidden max-w-md mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-1">
    <h1 class="text-xl font-bold">Dashboard</h1>
    <button id="logout-btn" data-testid="logout-btn" type="button"
      class="h-11 px-4 rounded-xl border border-slate-300 text-sm font-medium text-slate-700 active:bg-slate-50">
      Keluar
    </button>
  </div>
  <p id="dashboard-greeting" data-testid="dashboard-greeting" class="text-slate-500 mb-4"></p>

  <button id="new-record-btn" data-testid="new-record-btn" type="button"
    class="w-full h-12 rounded-xl bg-sky-600 text-white text-base font-semibold active:bg-sky-700 mb-5">
    + Buat Record
  </button>

  <div id="record-list" data-testid="record-list" class="space-y-3"></div>
  <p id="record-loading" class="hidden text-sm text-slate-400 text-center py-6">Memuat&hellip;</p>
  <p id="record-empty" data-testid="record-empty" class="hidden text-sm text-slate-400 text-center py-6">
    Belum ada record. Mulai dengan "Buat Record".
  </p>

  <!-- Dialog pilih jenis assignment untuk record baru -->
  <div id="jenis-dialog" data-testid="jenis-dialog"
    class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/40">
    <div class="bg-white w-full max-w-md rounded-2xl p-5 space-y-3">
      <h2 class="font-bold text-lg">Buat record baru</h2>
      <p class="text-sm text-slate-500">Pilih jenis assignment:</p>
      <button id="new-usaha" data-testid="new-usaha" type="button"
        class="w-full h-12 rounded-xl bg-indigo-600 text-white font-semibold active:bg-indigo-700">Usaha</button>
      <button id="new-keluarga" data-testid="new-keluarga" type="button"
        class="w-full h-12 rounded-xl bg-emerald-600 text-white font-semibold active:bg-emerald-700">Keluarga</button>
      <button id="jenis-cancel" data-testid="jenis-cancel" type="button"
        class="w-full h-12 rounded-xl border border-slate-300 font-medium active:bg-slate-50">Batal</button>
    </div>
  </div>
</section>
