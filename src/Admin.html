  <script>
    // Password admin hidup HANYA di variabel ini selama sesi halaman (bukan
    // localStorage) dan disertakan di TIAP panggilan privileged — server
    // mengecek ulang setiap kali; UI ini sama sekali bukan lapisan proteksi.
    var Adm = {
      pw: null, jenis: 'usaha', section: 'questions',
      questions: [], rules: [], fields: [], computedFields: [],
      editingQ: null, editingR: null,
      // Variabel Hitungan: field yang sedang diedit di dialog (null = tambah custom baru).
      editingCF: null,
      // Mode Ubah Urutan: staging lokal, baru commit ke server saat Simpan.
      reordering: false, reorderIds: [],
      // Rule Mode Sederhana: kombinator + daftar baris kondisi.
      combinator: 'all', condRows: [],
      activeFormulaEl: null
    };

    var SECTIONS = ['questions', 'rules', 'computed'];

    // Operator rule (dipakai membangun dropdown per baris kondisi).
    var RULE_OPS = [
      ['==', '== (sama dengan)'], ['!=', '!= (tidak sama)'],
      ['>', '>'], ['>=', '>='], ['<', '<'], ['<=', '<='],
      ['in', 'in (salah satu dari)'], ['not_in', 'not_in (bukan salah satu dari)'],
      ['empty', 'empty (kosong)'], ['not_empty', 'not_empty (terisi)'], ['regex', 'regex']
    ];

    var ADMIN_ERROR_MESSAGES = {
      FORBIDDEN: 'Password admin salah — akses ditolak server.',
      INVALID_JENIS: 'Jenis tidak valid.',
      INVALID_ALIAS: 'Alias tidak valid — huruf kecil/angka/underscore, diawali huruf.',
      DUPLICATE_ALIAS: 'Alias sudah dipakai pertanyaan/variabel lain di jenis ini.',
      INVALID_LABEL: 'Label wajib diisi.',
      INVALID_TYPE: 'Tipe pertanyaan tidak valid.',
      INVALID_OPTIONS: 'Tipe select butuh daftar opsi yang valid.',
      INVALID_ORDER: 'Urutan tidak valid — muat ulang halaman lalu coba lagi.',
      INVALID_SEVERITY: 'Severity tidak valid.',
      INVALID_MESSAGE: 'Pesan anomali wajib diisi.',
      INVALID_WHEN: 'Kondisi when tidak valid.',
      INVALID_RULE_ID: 'Rule ID tidak valid — pakai huruf/angka/underscore/strip, tidak boleh kosong.',
      DUPLICATE_RULE_ID: 'Rule ID sudah dipakai rule lain.',
      NOT_FOUND: 'Item tidak ditemukan — muat ulang halaman.',
      NOT_EDITABLE: 'Variabel ini tidak bisa diedit — logikanya tetap di kode (roster/lookup tabel).',
      INVALID_FORMULA: 'Formula tidak valid.'
    };

    function el(id) { return document.getElementById(id); }

    function gsRun(fnName) {
      var args = Array.prototype.slice.call(arguments, 1);
      return new Promise(function (resolve, reject) {
        var runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject);
        runner[fnName].apply(runner, args);
      });
    }

    function serverError(res) {
      var msg = ADMIN_ERROR_MESSAGES[res && res.error] || 'Gagal — coba lagi.';
      if (res && res.detail) msg += ' (' + res.detail + ')';
      return msg;
    }

    function showView(name) {
      document.querySelectorAll('.view').forEach(function (v) { v.classList.add('hidden'); });
      var v = el('admin-view-' + name);
      v.classList.remove('hidden');
      UiFx.replayAnim(v, 'view-enter');
    }

    // ==== TEXTAREA AUTO-EXPAND ====
    // Input teks yang isinya sering panjang (label pertanyaan, pesan anomali,
    // formula) dipakai sebagai <textarea class="auto-grow"> — tingginya
    // mengikuti isi, dibatasi max-height (lihat CSS).

    function autoGrow(ta) {
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      // Saat mentok max-height, buka scrollbar internal.
      ta.classList.toggle('at-max', ta.scrollHeight > ta.clientHeight + 2);
    }

    // Idempoten: aman dipanggil tiap dialog dibuka / value di-set programatik.
    // WAJIB dipanggil SETELAH elemen terlihat (display:none → scrollHeight 0).
    function wireAutoGrow(root) {
      (root || document).querySelectorAll('textarea.auto-grow').forEach(function (ta) {
        if (!ta.dataset.agWired) {
          ta.dataset.agWired = '1';
          ta.addEventListener('input', function () { autoGrow(ta); });
        }
        autoGrow(ta);
      });
    }

    // ==== LOGIN (gerbang UX — keamanan tetap di cek per-panggilan server) ====

    el('admin-login-form').addEventListener('submit', function (ev) {
      ev.preventDefault();
      var pw = el('admin-password').value;
      el('admin-login-error').classList.add('hidden');
      UiFx.btnBusy(el('admin-login-submit'), true, 'Memeriksa…');
      gsRun('checkAdminPassword', pw)
        .then(function (res) {
          UiFx.btnBusy(el('admin-login-submit'), false);
          if (res && res.ok) {
            Adm.pw = pw;
            el('admin-password').value = '';
            showView('main');
            setSection(Adm.section);
            setJenis(Adm.jenis);
          } else {
            el('admin-login-error').textContent = 'Password salah.';
            el('admin-login-error').classList.remove('hidden');
            UiFx.replayAnim(el('admin-login-error'), 'anim-in');
          }
        })
        .catch(function () {
          UiFx.btnBusy(el('admin-login-submit'), false);
          el('admin-login-error').textContent = 'Gagal terhubung ke server. Coba lagi.';
          el('admin-login-error').classList.remove('hidden');
          UiFx.replayAnim(el('admin-login-error'), 'anim-in');
        });
    });

    el('admin-logout').addEventListener('click', function () {
      Adm.pw = null;
      showView('login');
    });

    // ==== TAB BAGIAN (Pertanyaan / Rule / Variabel Hitungan) ====

    function setSection(sec) {
      Adm.section = sec;
      SECTIONS.forEach(function (s) {
        var active = s === sec;
        el('sec-panel-' + s).classList.toggle('hidden', !active);
        var btn = el('sec-tab-' + s);
        btn.className = 'sec-tab h-11 px-2.5 text-sm flex items-center gap-1.5 whitespace-nowrap font-semibold transition-colors ' +
          (active ? 'text-slate-900' : 'text-slate-400 hover:text-slate-600');
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
        var count = el('sec-count-' + s);
        count.className = 'text-[11px] font-bold px-1.5 py-0.5 rounded-full ' +
          (active ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-500');
      });
      moveInk();
      UiFx.replayAnim(el('sec-panel-' + sec), 'view-enter');
    }

    // Geser garis indikator ke tab aktif — dipanggil juga saat resize/font
    // selesai dimuat (lebar tab berubah setelah Inter aktif).
    function moveInk() {
      var btn = el('sec-tab-' + Adm.section);
      var nav = el('sec-tabs');
      var b = btn.getBoundingClientRect();
      var n = nav.getBoundingClientRect();
      if (!b.width) return; // view masih hidden — nanti dipanggil ulang
      el('sec-ink').style.width = b.width + 'px';
      el('sec-ink').style.transform = 'translateX(' + (b.left - n.left) + 'px)';
    }
    window.addEventListener('resize', moveInk);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(moveInk);

    SECTIONS.forEach(function (s) {
      el('sec-tab-' + s).addEventListener('click', function () { setSection(s); });
    });

    function updateCounts() {
      el('sec-count-questions').textContent = Adm.questions.length;
      el('sec-count-rules').textContent = Adm.rules.length;
      el('sec-count-computed').textContent = Adm.computedFields.length;
      moveInk(); // lebar tab bisa berubah saat angka berganti digit
    }

    // ==== TAB JENIS ====

    function setJenis(jenis) {
      Adm.jenis = jenis;
      ['usaha', 'keluarga'].forEach(function (j) {
        el('jenis-tab-' + j).className = 'h-8 px-2.5 rounded-full text-xs font-semibold transition-colors ' +
          (j === jenis ? 'bg-white shadow-sm text-orange-700' : 'text-slate-500 hover:text-slate-700');
      });
      loadAll();
    }
    el('jenis-tab-usaha').addEventListener('click', function () { setJenis('usaha'); });
    el('jenis-tab-keluarga').addEventListener('click', function () { setJenis('keluarga'); });

    // Redupkan daftar selagi mutasi (toggle/reorder/hapus) menunggu server —
    // umpan balik instan sebelum loadAll menggambar ulang dengan skeleton.
    function setListsBusy(busy) {
      ['aq-list', 'ar-list', 'acf-list'].forEach(function (id) {
        el(id).classList.toggle('busy-dim', !!busy);
      });
    }

    function loadAll() {
      setListsBusy(false);
      el('aq-list').innerHTML = UiFx.skeletonList(3, 'h-28');
      el('ar-list').innerHTML = UiFx.skeletonList(3, 'h-24');
      el('acf-list').innerHTML = UiFx.skeletonList(3, 'h-20');
      return Promise.all([
        gsRun('getQuestions', Adm.jenis, true),   // admin lihat SEMUA termasuk nonaktif
        gsRun('getRules', Adm.jenis, true),
        gsRun('getRuleFieldOptions', Adm.jenis),
        gsRun('getComputedFields', Adm.jenis)
      ]).then(function (vals) {
        Adm.questions = (vals[0] && vals[0].questions) || [];
        Adm.rules = (vals[1] && vals[1].rules) || [];
        Adm.fields = (vals[2] && vals[2].fields) || [];
        Adm.computedFields = (vals[3] && vals[3].fields) || [];
        renderQuestions();
        renderRules();
        renderComputedFields();
        updateCounts();
      }).catch(function () {
        el('aq-list').innerHTML = '<p class="text-sm text-red-600">Gagal memuat — periksa koneksi.</p>';
        el('ar-list').innerHTML = '<p class="text-sm text-red-600">Gagal memuat — periksa koneksi.</p>';
        el('acf-list').innerHTML = '<p class="text-sm text-red-600">Gagal memuat — periksa koneksi.</p>';
      });
    }

    function badge(text, cls) {
      return '<span class="text-[11px] font-semibold px-1.5 py-0.5 rounded ' + cls + '">' + text + '</span>';
    }

    function emptyState(wrap, text) {
      wrap.innerHTML = '<p class="text-sm text-slate-400 text-center border border-dashed border-slate-200 rounded-xl py-8">' + text + '</p>';
    }

    // ==== KELOLA PERTANYAAN ====

    function renderQuestions() {
      if (Adm.reordering) { renderQuestionsReorder(); return; }
      var wrap = el('aq-list');
      wrap.innerHTML = '';
      if (!Adm.questions.length) { emptyState(wrap, 'Belum ada pertanyaan.'); return; }
      Adm.questions.forEach(function (q) {
        var row = document.createElement('div');
        row.setAttribute('data-testid', 'aq-row-' + q.question_id);
        row.className = 'row-card rounded-xl border border-slate-200 bg-white p-3 space-y-2' + (q.active ? '' : ' opacity-60 bg-slate-50');
        var badges = badge(q.type, 'bg-slate-100 text-slate-600');
        if (q.required) badges += ' ' + badge('wajib', 'bg-orange-100 text-orange-700');
        if (q.roster_group) badges += ' ' + badge('roster: ' + q.roster_group, 'bg-indigo-100 text-indigo-700');
        if (!q.active) badges += ' ' + badge('NONAKTIF', 'bg-red-100 text-red-700');
        row.innerHTML =
          '<div class="flex items-start gap-2.5">' +
            '<span class="shrink-0 w-7 h-7 rounded-full bg-slate-100 text-slate-500 text-xs font-bold flex items-center justify-center">' + q.order + '</span>' +
            '<div class="min-w-0">' +
              '<p class="text-sm font-medium leading-snug"></p>' +
              '<p class="text-xs text-slate-400 font-mono mt-0.5">' + q.question_id + '</p>' +
              '<div class="flex flex-wrap gap-1 mt-1.5">' + badges + '</div>' +
            '</div>' +
          '</div>';
        row.querySelector('p').textContent = q.label;

        var btns = document.createElement('div');
        btns.className = 'flex gap-2';
        btns.appendChild(smallBtn('Edit', 'aq-edit-' + q.question_id, false, function () { openQuestionDialog(q); }));
        btns.appendChild(smallBtn(q.active ? 'Nonaktifkan' : 'Aktifkan', 'aq-toggle-' + q.question_id, false, function () {
          runMutation(gsRun('setQuestionActive', Adm.pw, Adm.jenis, q.question_id, !q.active));
        }, q.active ? 'text-red-600' : 'text-emerald-700'));
        row.appendChild(btns);
        wrap.appendChild(row);
      });
      UiFx.staggerIn(wrap.children, 30);
    }

    function smallBtn(text, testid, disabled, onClick, extraCls) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = text;
      b.disabled = disabled;
      b.setAttribute('data-testid', testid);
      b.className = 'h-11 px-3 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50 active:bg-slate-100 disabled:opacity-30 ' + (extraCls || 'text-slate-700');
      b.addEventListener('click', onClick);
      return b;
    }

    // ---- Mode Ubah Urutan (drag & drop) ----
    // Seret ≡ untuk menata urutan lokal (Adm.reorderIds); tombol ↑/↓ juga
    // menata staging (aksesibilitas). Tidak ada panggilan server sampai
    // "Simpan Urutan" ditekan. Batal membuang perubahan.

    function enterReorder() {
      if (!Adm.questions.length) return;
      Adm.reordering = true;
      Adm.reorderIds = Adm.questions.map(function (q) { return q.question_id; });
      el('aq-add').classList.add('hidden');
      el('aq-reorder').classList.add('hidden');
      el('aq-hint').classList.add('hidden');
      el('aq-reorder-bar').classList.remove('hidden');
      renderQuestions();
    }

    function exitReorder() {
      Adm.reordering = false;
      el('aq-add').classList.remove('hidden');
      el('aq-reorder').classList.remove('hidden');
      el('aq-hint').classList.remove('hidden');
      el('aq-reorder-bar').classList.add('hidden');
      renderQuestions();
    }

    el('aq-reorder').addEventListener('click', enterReorder);
    el('aq-reorder-cancel').addEventListener('click', exitReorder);
    el('aq-reorder-save').addEventListener('click', function () {
      var btn = el('aq-reorder-save');
      UiFx.btnBusy(btn, true, 'Menyimpan…');
      gsRun('reorderQuestions', Adm.pw, Adm.jenis, Adm.reorderIds.slice())
        .then(function (res) {
          UiFx.btnBusy(btn, false);
          if (!(res && res.ok)) { alert(serverError(res)); return; }
          Adm.reordering = false;
          el('aq-add').classList.remove('hidden');
          el('aq-reorder').classList.remove('hidden');
          el('aq-hint').classList.remove('hidden');
          el('aq-reorder-bar').classList.add('hidden');
          UiFx.toast('Urutan tersimpan.');
          loadAll(); // gambar ulang dengan order final dari server
        })
        .catch(function () {
          UiFx.btnBusy(btn, false);
          alert('Gagal terhubung ke server.');
        });
    });

    function renderQuestionsReorder() {
      var wrap = el('aq-list');
      wrap.innerHTML = '';
      var byId = {};
      Adm.questions.forEach(function (q) { byId[q.question_id] = q; });
      Adm.reorderIds.forEach(function (id, i) {
        var q = byId[id];
        if (!q) return;
        var row = document.createElement('div');
        row.className = 'reorder-row rounded-xl border border-slate-200 bg-white p-3 flex items-center gap-2' + (q.active ? '' : ' opacity-60');
        row.setAttribute('data-qid', id);
        row.setAttribute('data-testid', 'aq-reorder-row-' + id);

        var handle = document.createElement('span');
        handle.className = 'drag-handle shrink-0 w-11 h-11 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center text-xl select-none';
        handle.textContent = '≡';
        handle.setAttribute('aria-label', 'Seret untuk mengubah urutan');
        row.appendChild(handle);

        var num = document.createElement('span');
        num.className = 'reorder-num shrink-0 w-6 h-6 rounded-full bg-slate-100 text-slate-500 text-xs font-bold flex items-center justify-center';
        num.textContent = i + 1;
        row.appendChild(num);

        var mid = document.createElement('div');
        mid.className = 'min-w-0 flex-1';
        var lbl = document.createElement('p');
        lbl.className = 'text-sm font-medium leading-snug truncate';
        lbl.textContent = q.label;
        var idp = document.createElement('p');
        idp.className = 'text-xs text-slate-400 font-mono';
        idp.textContent = id + (q.active ? '' : ' · NONAKTIF');
        mid.appendChild(lbl);
        mid.appendChild(idp);
        row.appendChild(mid);

        var upDown = document.createElement('div');
        upDown.className = 'flex flex-col gap-1 shrink-0';
        upDown.appendChild(miniBtn('↑', 'aq-up-' + id, i === 0, function () { moveReorder(i, -1); }));
        upDown.appendChild(miniBtn('↓', 'aq-down-' + id, i === Adm.reorderIds.length - 1, function () { moveReorder(i, 1); }));
        row.appendChild(upDown);

        wrap.appendChild(row);
        makeSortableRow(row, handle);
      });
    }

    function miniBtn(text, testid, disabled, onClick) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = text;
      b.disabled = disabled;
      b.setAttribute('data-testid', testid);
      b.className = 'w-9 h-9 rounded-lg border border-slate-200 text-sm font-bold hover:bg-slate-50 active:bg-slate-100 disabled:opacity-30 text-slate-600';
      b.addEventListener('click', onClick);
      return b;
    }

    function moveReorder(index, delta) {
      Adm.reorderIds = AdminLogic.moveItem(Adm.reorderIds, index, delta);
      flipRenderReorder();
    }

    // -- drag pointer-events (jalan di sentuh & mouse) --
    //
    // Prinsip (memperbaiki freeze lama): selama diseret, HANYA baris yang
    // digenggam yang berpindah — murni translateY aritmetika dari nilai yang
    // di-cache sekali di awal drag (grabY, startDocTop), TANPA memanggil
    // getBoundingClientRect atau memindah node lain tiap pointermove. Baris
    // lain diam total, cuma ditandai garis (box-shadow, tidak mengubah
    // layout) di titik tempat akan disisipkan. Urutan Adm.reorderIds & DOM
    // baru benar-benar disusun ulang SAAT DROP (endDrag) — sesuai keinginan:
    // "atur posisi lainnya setelah drop", bukan digeser langsung tiap frame.
    // Pointermove mentah bisa berfrekuensi sangat tinggi; kerja berat
    // (autoScroll + hitung target) dijatah maksimal 1×/frame lewat rAF.
    var drag = null;

    function makeSortableRow(row, handle) {
      handle.addEventListener('pointerdown', function (e) {
        if (!Adm.reordering || drag) return;
        e.preventDefault();
        try { row.setPointerCapture(e.pointerId); } catch (_) {}
        startDrag(row, e);
      });
      row.addEventListener('pointermove', function (e) {
        if (!drag || drag.el !== row || e.pointerId !== drag.pid) return;
        e.preventDefault();
        drag.pendingClientY = e.clientY;
        if (!drag.rafId) drag.rafId = requestAnimationFrame(runDragFrame);
      });
      var end = function () {
        if (!drag || drag.el !== row) return;
        try { row.releasePointerCapture(drag.pid); } catch (_) {}
        endDrag();
      };
      row.addEventListener('pointerup', end);
      row.addEventListener('pointercancel', end);
    }

    // Cache SEKALI di awal drag: posisi (relatif dokumen, tahan gulung layar)
    // semua baris LAIN — baris ini tidak pernah dipindah selama drag jadi
    // cache-nya tetap valid sepanjang gesture, tak perlu query ulang.
    function startDrag(row, e) {
      var list = el('aq-list');
      var rect = row.getBoundingClientRect();
      var scrollY0 = window.scrollY;
      var others = [], othersRowEls = [];
      Array.prototype.forEach.call(list.querySelectorAll('.reorder-row'), function (r) {
        if (r === row) return;
        var rr = r.getBoundingClientRect();
        others.push({ id: r.getAttribute('data-qid'), top: rr.top + scrollY0, height: rr.height });
        othersRowEls.push(r);
      });
      row.style.transition = 'none'; // ikuti jari instan, jangan animasi
      drag = {
        el: row, pid: e.pointerId, qid: row.getAttribute('data-qid'),
        grabY: e.clientY - rect.top,
        startDocTop: rect.top + scrollY0,
        othersIds: others.map(function (o) { return o.id; }),
        others: others, othersRowEls: othersRowEls,
        lastTargetPosition: -1, rafId: null, pendingClientY: null
      };
      row.classList.add('dragging');
    }

    function runDragFrame() {
      if (!drag) return;
      drag.rafId = null;
      var clientY = drag.pendingClientY;
      if (clientY == null) return;
      autoScroll(clientY);
      var pointerDocY = clientY + window.scrollY;
      drag.el.style.transform = 'translateY(' + (pointerDocY - drag.grabY - drag.startDocTop) + 'px)';
      updateDropTarget(pointerDocY);
    }

    // Tandai titik sisip lewat highlight (box-shadow) tanpa memindah/mendorong
    // baris lain — hanya berubah kalau posisi target benar-benar bergeser.
    function updateDropTarget(pointerDocY) {
      var pos = drag.others.length;
      for (var i = 0; i < drag.others.length; i++) {
        if (pointerDocY < drag.others[i].top + drag.others[i].height / 2) { pos = i; break; }
      }
      if (pos === drag.lastTargetPosition) return;
      drag.lastTargetPosition = pos;
      drag.othersRowEls.forEach(function (r) { r.classList.remove('drop-before', 'drop-after'); });
      if (pos < drag.othersRowEls.length) {
        drag.othersRowEls[pos].classList.add('drop-before');
      } else if (drag.othersRowEls.length) {
        drag.othersRowEls[drag.othersRowEls.length - 1].classList.add('drop-after');
      }
    }

    // Gulung halaman saat jari mendekati tepi atas/bawah (daftar bisa panjang).
    function autoScroll(clientY) {
      var margin = 80;
      if (clientY < margin) window.scrollBy(0, -14);
      else if (clientY > window.innerHeight - margin) window.scrollBy(0, 14);
    }

    // Baru di sinilah Adm.reorderIds & DOM disusun ulang beneran (drop) —
    // lalu diberi animasi FLIP sekali supaya baris "meluncur" mulus ke posisi
    // akhir alih-alih meloncat, tanpa beban per-frame apa pun.
    function endDrag() {
      if (drag.rafId) cancelAnimationFrame(drag.rafId);
      var pos = drag.lastTargetPosition < 0 ? drag.othersIds.length : drag.lastTargetPosition;
      Adm.reorderIds = drag.othersIds.slice(0, pos).concat([drag.qid], drag.othersIds.slice(pos));
      var list = el('aq-list');
      Array.prototype.forEach.call(list.querySelectorAll('.reorder-row'), function (r) {
        r.classList.remove('drop-before', 'drop-after', 'dragging');
        r.style.transform = '';
        r.style.transition = '';
      });
      drag = null;
      flipRenderReorder();
    }

    // FLIP: capture posisi lama → render ulang (urutan baru) → animasikan
    // selisihnya jadi 0. Dipanggil sekali per aksi (drop / tombol ↑↓), bukan
    // per-frame, jadi aman dari sisi performa.
    function flipRenderReorder() {
      var list = el('aq-list');
      var firstRects = {};
      Array.prototype.forEach.call(list.querySelectorAll('.reorder-row'), function (r) {
        firstRects[r.getAttribute('data-qid')] = r.getBoundingClientRect();
      });
      renderQuestionsReorder();
      Array.prototype.forEach.call(list.querySelectorAll('.reorder-row'), function (r) {
        var first = firstRects[r.getAttribute('data-qid')];
        if (!first) return;
        var dy = first.top - r.getBoundingClientRect().top;
        if (!dy) return;
        r.style.transition = 'none';
        r.style.transform = 'translateY(' + dy + 'px)';
        requestAnimationFrame(function () {
          r.style.transition = 'transform 200ms ease';
          r.style.transform = '';
          setTimeout(function () { r.style.transition = ''; }, 220);
        });
      });
    }

    function afterMutation(res) {
      if (!(res && res.ok)) {
        setListsBusy(false);
        alert(serverError(res));
        return;
      }
      UiFx.toast('Perubahan tersimpan.');
      loadAll();
    }

    // Semua mutasi daftar lewat sini: dim → panggil server → afterMutation;
    // gagal network pun daftar dibuka lagi (jangan terkunci dim).
    function runMutation(promise) {
      setListsBusy(true);
      promise.then(afterMutation).catch(function () {
        setListsBusy(false);
        alert('Gagal terhubung ke server.');
      });
    }

    // Hapus custom field: beri tahu rule aktif mana yang masih merujuknya —
    // rule itu tidak error, tapi kondisinya jadi tak pernah cocok (nilai kosong).
    function confirmDeleteComputed(f) {
      var usedBy = Adm.rules.filter(function (r) {
        return r.active && AdminLogic.fieldsUsedInWhen(r.when).indexOf(f.id) !== -1;
      }).map(function (r) { return r.rule_id; });
      var msg = 'Hapus variabel "' + f.id + '"?';
      if (usedBy.length) {
        msg += '\n\nPERHATIAN: masih dipakai rule aktif ' + usedBy.join(', ') +
          ' — kondisi rule itu tidak akan pernah cocok lagi setelah variabel dihapus.';
      }
      if (!confirm(msg)) return;
      runMutation(gsRun('deleteComputedField', Adm.pw, Adm.jenis, f.id));
    }

    // Panel variabel di dialog (sisip alias ke kotak formula). Variabel yang
    // sedang diedit disembunyikan dari daftar (merujuk diri sendiri = nilai
    // lama yang belum dihitung → 0, hampir pasti bukan yang dimaksud admin).
    function renderAcfVarPanel() {
      var q = el('acf-var-search').value.trim().toLowerCase();
      var editingId = Adm.editingCF ? Adm.editingCF.id : null;
      var fields = Adm.fields.filter(function (f) { return f.id !== editingId; });
      renderVarChips(el('acf-var-list'), fields, q, function (alias) {
        insertIntoTextarea(el('acf-formula'), alias);
      });
    }
    el('acf-var-search').addEventListener('input', renderAcfVarPanel);

    // ==== KELOLA RULE ====

    var SEVERITY_CLS = { error: 'bg-red-100 text-red-700', warning: 'bg-amber-100 text-amber-800' };

    function renderRules() {
      var wrap = el('ar-list');
      wrap.innerHTML = '';
      if (!Adm.rules.length) { emptyState(wrap, 'Belum ada rule.'); return; }
      Adm.rules.forEach(function (r) {

        btns.appendChild(smallBtn(r.active ? 'Nonaktifkan' : 'Aktifkan', 'ar-toggle-' + r.rule_id, false, function () {

    // -- dialog rule --

    function fieldMeta(id) {
      for (var i = 0; i < Adm.fields.length; i++) if (Adm.fields[i].id === id) return Adm.fields[i];
      return null;
    }

    // ---- Mode Sederhana: daftar baris kondisi (Adm.condRows) ----
    // Struktur baris disimpan di Adm.condRows; nilai value/field2 dibaca dari
    // DOM saat perlu (syncCondRows) supaya render ulang tak menghilangkan
    // ketikan. buildSimpleGroup (AdminLogic) merangkainya jadi `when`.

    // Label singkat (shortLabel) supaya opsi dropdown tak terpotong di tengah
    // kata pada select yang sempit — sama seperti panel Variabel.
    function fillFieldSelect(sel, selected) {
      Adm.fields.forEach(function (f) { sel.appendChild(new Option(f.id + ' — ' + shortLabel(f.label), f.id)); });
      if (selected) sel.value = selected;
    }

    // Kontrol value satu baris: dropdown field pembanding (compare='field'),
    // dropdown opsi select (==/!=), comma-list (in/not_in), atau input biasa.
    function condValueControl(cond, idx) {
      var op = cond.op;
      if (op === 'empty' || op === 'not_empty') return null; // tak butuh value
      if (cond.compare === 'field') {
        var f2 = document.createElement('select');
        f2.className = 'ar-cond-field2 w-full h-12 px-3 text-base rounded-xl border border-slate-300 bg-white';
        f2.setAttribute('data-testid', 'ar-cond-field2-' + idx);
        fillFieldSelect(f2, cond.field2);
        return f2;
      }
      var meta = fieldMeta(cond.field), input;
      if (meta && meta.options && (op === '==' || op === '!=')) {
        input = document.createElement('select');
        input.className = 'ar-cond-value w-full h-12 px-3 text-base rounded-xl border border-slate-300 bg-white';
        meta.options.forEach(function (o) { input.appendChild(new Option(o.value + '. ' + o.label, String(o.value))); });
        if (cond.value !== undefined && cond.value !== '') input.value = String(cond.value);
      } else {
        input = document.createElement('input');
        input.className = 'ar-cond-value w-full h-12 px-3 text-base rounded-xl border border-slate-300';
        input.placeholder = (op === 'in' || op === 'not_in') ? 'mis. 1, 2, 3' : '';
        if (cond.value !== undefined && cond.value !== '') {
          input.value = Array.isArray(cond.value) ? cond.value.join(', ') : String(cond.value);
        }
      }
      input.setAttribute('data-testid', 'ar-cond-value-' + idx);
      return input;
    }

    // Baca kembali nilai DOM tiap baris → Adm.condRows (sebelum render ulang).
    // Tiap baris ber-kind 'simple' (field/op/value) ATAU 'formula' (teks).
    function syncCondRows() {
      var rows = el('ar-cond-list').querySelectorAll('.ar-cond-row');
      Adm.condRows = Array.prototype.map.call(rows, function (row) {
        if (row.dataset.kind === 'formula') {
          var fx = row.querySelector('.ar-cond-formula');
          return { kind: 'formula', formula: fx ? fx.value : '', field: '', op: '', compare: 'value', value: '', field2: '' };
        }
        var cmp = row.querySelector('.ar-cond-compare');
        var f2 = row.querySelector('.ar-cond-field2');
        var val = row.querySelector('.ar-cond-value');
        return {
          kind: 'simple',
          field: row.querySelector('.ar-cond-field').value,
          op: row.querySelector('.ar-cond-op').value,
          compare: cmp ? cmp.value : 'value',
          field2: f2 ? f2.value : '',
          value: val ? val.value : ''
        };
      });
    }

    function renderConditions() {
      var list = el('ar-cond-list');
      list.innerHTML = '';
      Adm.condRows.forEach(function (cond, idx) {
        var isFormula = cond.kind === 'formula';

        var row = document.createElement('div');
        row.className = 'ar-cond-row rounded-xl border border-slate-200 p-3 space-y-2';
        row.setAttribute('data-testid', 'ar-cond-' + idx);
        row.dataset.kind = isFormula ? 'formula' : 'simple';

        // Header: label + pemilih tipe (Sederhana/Formula) + Hapus.
        var head = document.createElement('div');
        head.className = 'flex items-center gap-2';
        var lbl = document.createElement('span');
        lbl.className = 'text-xs font-semibold text-slate-400 mr-auto';
        lbl.textContent = 'Kondisi ' + (idx + 1);
        head.appendChild(lbl);

        var typeSel = document.createElement('select');
        typeSel.className = 'ar-cond-type h-8 px-2 text-xs rounded-lg border border-slate-300 bg-white';
        typeSel.setAttribute('data-testid', 'ar-cond-type-' + idx);
        typeSel.appendChild(new Option('Sederhana', 'simple'));
        typeSel.appendChild(new Option('Formula', 'formula'));
        typeSel.value = isFormula ? 'formula' : 'simple';
        typeSel.addEventListener('change', function () { setRowType(idx, typeSel.value); });
        head.appendChild(typeSel);

        var rm = document.createElement('button');
        rm.type = 'button';
        rm.textContent = 'Hapus';
        rm.setAttribute('data-testid', 'ar-cond-remove-' + idx);
        rm.className = 'h-8 px-2 rounded-lg text-xs font-medium text-red-600 hover:bg-red-50 active:bg-red-100 disabled:opacity-30';
        rm.disabled = Adm.condRows.length <= 1; // selalu sisakan minimal 1 kondisi
        rm.addEventListener('click', function () { removeCondition(idx); });
        head.appendChild(rm);
        row.appendChild(head);

        if (isFormula) { renderFormulaBody(row, cond, idx); }
        else { renderSimpleBody(row, cond, idx); }

        list.appendChild(row);
      });
      el('ar-combinator-wrap').classList.toggle('hidden', Adm.condRows.length < 2);
      wireAutoGrow(list);
    }

    // Baris kind 'simple': field / operator / pembanding / value.
    function renderSimpleBody(row, cond, idx) {
      // op non-perbandingan tak bisa compare='field' — paksa balik ke value.
      var canCompareField = AdminLogic.CMP_OPS.indexOf(cond.op) !== -1;
      if (!canCompareField && cond.compare === 'field') cond.compare = 'value';

      // Grid 2 kolom tetap (1 kolom di HP): setiap kontrol dapat sel sendiri
      // yang konsisten, tak ada kotak "nyasar" melebar sendirian saat jumlah
      // kontrol ganjil (beda dari flex-wrap lama yang bikin tampilan berantakan).
      var controls = document.createElement('div');
      controls.className = 'grid grid-cols-1 sm:grid-cols-2 gap-2';
      row.appendChild(controls);

      var fieldSel = document.createElement('select');
      fieldSel.className = 'ar-cond-field w-full h-12 px-3 text-base rounded-xl border border-slate-300 bg-white';
      fieldSel.setAttribute('data-testid', 'ar-cond-field-' + idx);
      fillFieldSelect(fieldSel, cond.field);
      fieldSel.addEventListener('change', function () { syncCondRows(); renderConditions(); });
      controls.appendChild(fieldSel);

      var opSel = document.createElement('select');
      opSel.className = 'ar-cond-op w-full h-12 px-3 text-base rounded-xl border border-slate-300 bg-white';
      opSel.setAttribute('data-testid', 'ar-cond-op-' + idx);
      RULE_OPS.forEach(function (o) { opSel.appendChild(new Option(o[1], o[0])); });
      opSel.value = cond.op;
      opSel.addEventListener('change', function () { syncCondRows(); renderConditions(); });
      controls.appendChild(opSel);

      // Pilih pembanding (Nilai tetap / Field lain) — hanya untuk operator banding.
      if (canCompareField) {
        var cmpSel = document.createElement('select');
        cmpSel.className = 'ar-cond-compare w-full h-12 px-3 text-base rounded-xl border border-slate-300 bg-white';
        cmpSel.setAttribute('data-testid', 'ar-cond-compare-' + idx);
        cmpSel.appendChild(new Option('Bandingkan: nilai tetap', 'value'));
        cmpSel.appendChild(new Option('Bandingkan: field lain', 'field'));
        cmpSel.value = cond.compare === 'field' ? 'field' : 'value';
        cmpSel.addEventListener('change', function () { syncCondRows(); renderConditions(); });
        controls.appendChild(cmpSel);
      }

      var slot = document.createElement('div');
      slot.className = 'ar-cond-value-slot';
      var ctrl = condValueControl(cond, idx);
      if (ctrl) slot.appendChild(ctrl);
      controls.appendChild(slot);
    }

    // Baris kind 'formula': satu textarea ekspresi (klik chip Variabel menyisip).
    function renderFormulaBody(row, cond, idx) {
      var ta = document.createElement('textarea');
      ta.className = 'ar-cond-formula auto-grow w-full px-3 py-3 text-base rounded-xl border border-slate-300 font-mono';
      ta.setAttribute('data-testid', 'ar-cond-formula-' + idx);
      ta.rows = 1;
      ta.spellcheck = false;
      ta.placeholder = 'mis. r26b / r26_total >= 0.5';
      ta.value = cond.formula || '';
      ta.addEventListener('focus', function () { Adm.activeFormulaEl = ta; });
      row.appendChild(ta);
      var hint = document.createElement('p');
      hint.className = 'text-xs text-slate-400';
      hint.innerHTML = 'Satu perbandingan aritmetika: <span class="font-mono">+ - * / ( )</span> lalu ' +
        '<span class="font-mono">== != &gt; &gt;= &lt; &lt;=</span>. Pakai alias dari panel Variabel di bawah.';
      row.appendChild(hint);
    }

    function newCondition(kind) {
      if (kind === 'formula') {
        return { kind: 'formula', formula: '', field: '', op: '', compare: 'value', value: '', field2: '' };
      }
      return { kind: 'simple', field: (Adm.fields[0] ? Adm.fields[0].id : ''), op: '==', compare: 'value', value: '', field2: '' };
    }

    // Ganti tipe satu baris (Sederhana ⇄ Formula) tanpa mengubah baris lain.
    function setRowType(idx, kind) {
      syncCondRows();
      var c = Adm.condRows[idx];
      c.kind = kind === 'formula' ? 'formula' : 'simple';
      if (c.kind === 'formula' && c.formula == null) c.formula = '';
      if (c.kind === 'simple' && !c.field) c.field = (Adm.fields[0] ? Adm.fields[0].id : '');
      renderConditions();
    }

    function addCondition() {
      syncCondRows();
      Adm.condRows.push(newCondition('simple'));
      renderConditions();
    }

    function removeCondition(idx) {
      syncCondRows();
      if (Adm.condRows.length <= 1) return;
      Adm.condRows.splice(idx, 1);
      renderConditions();
    }

    el('ar-cond-add').addEventListener('click', addCondition);
    el('ar-combinator').addEventListener('change', function () { Adm.combinator = el('ar-combinator').value; });

    function isKnownField(id) { return fieldMeta(id) !== null; }

    // Builder kondisi vs editor JSON: JSON dipakai otomatis untuk rule kompleks
    // lama (roster/bersarang), ATAU manual saat admin sengaja butuh AND/OR
    // campur berkurung (nested) yang tak bisa direpresentasikan builder flat.
    function showBuilder(useBuilder) {
      el('ar-builder-wrap').classList.toggle('hidden', !useBuilder);
      el('ar-adv-wrap').classList.toggle('hidden', useBuilder);
    }
    function isAdvancedRule() { return !el('ar-adv-wrap').classList.contains('hidden'); }

    // Catatan di atas editor JSON beda tergantung ALASAN masuk mode ini:
    // auto (rule kompleks lama, warna amber) vs manual (pilihan admin sendiri
    // untuk kondisi berkurung, warna netral).
    function updateAdvNote(auto) {
      el('ar-adv-note-auto').classList.toggle('hidden', !auto);
      el('ar-adv-note-manual').classList.toggle('hidden', auto);
    }

    // Builder → JSON: rakit `when` dari kondisi saat ini (harus valid dulu)
    // supaya admin tak kehilangan kondisi yang sudah diisi saat pindah mode.
    el('ar-switch-advanced').addEventListener('click', function () {
      syncCondRows();
      var w = AdminLogic.buildSimpleGroup(Adm.combinator, Adm.condRows, fieldMeta);
      if (!w.ok) {
        el('ar-error').textContent = w.error;
        el('ar-error').classList.remove('hidden');
        return;
      }
      el('ar-error').classList.add('hidden');
      el('ar-json').value = JSON.stringify(w.when, null, 2);
      updateAdvNote(false);
      showBuilder(false);
      wireAutoGrow(el('ar-adv-wrap'));
    });

    // JSON → builder: hanya berhasil kalau strukturnya "sederhana" (leaf polos/
    // formula digabung all/any DATAR, semua field dikenal) — roster/bersarang
    // memang di luar jangkauan builder, sesuai batasan yang disengaja.
    el('ar-switch-builder').addEventListener('click', function () {
      var parsed = AdminLogic.parseAdvancedWhen(el('ar-json').value);
      if (!parsed.ok) {
        el('ar-error').textContent = parsed.error;
        el('ar-error').classList.remove('hidden');
        return;
      }
      var cls = AdminLogic.classifySimpleGroup(parsed.when, isKnownField);
      if (!cls.simple) {
        el('ar-error').textContent = 'Kondisi ini memakai roster/bersarang/kurung — tidak bisa dibuka di builder sederhana.';
        el('ar-error').classList.remove('hidden');
        return;
      }
      el('ar-error').classList.add('hidden');
      Adm.combinator = cls.combinator;
      Adm.condRows = cls.conditions;
      el('ar-combinator').value = Adm.combinator;
      renderConditions();
      showBuilder(true);
    });

    // ---- Panel Variabel: referensi alias field; klik = sisip ke Formula ----

    // Arti singkat: buang prefiks penomoran ("26a. ", "11a. ", "8.a. "),
    // buang "(hitungan)", potong bila kepanjangan — supaya mudah dibaca.
    function shortLabel(label) {
      var s = String(label == null ? '' : label).replace(/^\s*[\w.]+\.\s+/, '').replace(/\s*\(hitungan\)\s*$/i, '').trim();
      return s.length > 34 ? s.slice(0, 33).trim() + '…' : s;
    }

    // Bangun daftar chip variabel (dipakai dialog Rule DAN dialog Variabel).
    function renderVarChips(listEl, fields, query, onPick) {
      listEl.innerHTML = '';
      fields
        .filter(function (f) {
          return !query || f.id.toLowerCase().indexOf(query) !== -1 || String(f.label).toLowerCase().indexOf(query) !== -1;
        })
        .forEach(function (f) {
          var b = document.createElement('button');
          b.type = 'button';
          b.setAttribute('data-testid', listEl.id + '-' + f.id);
          b.className = 'flex items-center gap-2 text-left px-2 py-1.5 rounded-lg border border-slate-200 bg-white hover:border-orange-200 hover:bg-orange-50/50 active:bg-orange-50';
          var alias = document.createElement('span');
          alias.className = 'font-mono text-xs shrink-0 ' + (f.source === 'computed' ? 'text-indigo-700' : 'text-slate-700');
          alias.textContent = f.id;
          var meaning = document.createElement('span');
          meaning.className = 'text-xs text-slate-500 truncate';
          meaning.textContent = shortLabel(f.label);
          b.appendChild(alias);
          b.appendChild(meaning);
          b.addEventListener('click', function () { onPick(f.id); });
          listEl.appendChild(b);
        });
      if (!listEl.children.length) {
        listEl.innerHTML = '<span class="text-xs text-slate-400">Tidak ada variabel cocok.</span>';
      }
    }

    function renderVarPanel() {
      var q = el('ar-var-search').value.trim().toLowerCase();
      renderVarChips(el('ar-var-list'), Adm.fields, q, insertVar);
    }
    el('ar-var-search').addEventListener('input', renderVarPanel);

    // Sisip alias di posisi kursor sebuah textarea (dipakai kedua dialog).
    function insertIntoTextarea(ta, alias) {
      var start = ta.selectionStart == null ? ta.value.length : ta.selectionStart;
      var end = ta.selectionEnd == null ? ta.value.length : ta.selectionEnd;
      var before = ta.value.slice(0, start);
      var after = ta.value.slice(end);
      var pad = before && !/\s$/.test(before) ? ' ' : '';
      var insert = pad + alias + ' ';
      ta.value = before + insert + after;
      var caret = (before + insert).length;
      ta.focus();
      ta.setSelectionRange(caret, caret);
      autoGrow(ta);
    }

    // Textarea formula yang jadi sasaran sisip: yang terakhir difokuskan (kalau
    // masih ada), atau satu-satunya kalau memang cuma ada satu.
    function activeFormulaTextarea() {
      if (Adm.activeFormulaEl && document.contains(Adm.activeFormulaEl)) return Adm.activeFormulaEl;
      var tas = el('ar-cond-list').querySelectorAll('.ar-cond-formula');
      return tas.length === 1 ? tas[0] : null;
    }

    function insertVar(alias) {
      var ta = activeFormulaTextarea();
      if (!ta) { UiFx.toast('Klik dulu kotak Formula untuk menyisipkan variabel.'); return; }
      Adm.activeFormulaEl = ta;
      insertIntoTextarea(ta, alias);
    }

    function openRuleDialog(r) {
      Adm.editingR = r ? r.rule_id : null;
      el('ar-dialog-title').textContent = r ? 'Edit Rule' : 'Tambah Rule';
      el('ar-rule-id').value = r ? r.rule_id : '';
      el('ar-severity').value = r ? r.severity : 'warning';
      el('ar-message').value = r ? r.message : '';
      el('ar-error').classList.add('hidden');
      el('ar-preview-result').classList.add('hidden');
      el('ar-preview-computed').classList.add('hidden');
      el('ar-preview-answers').value = '';
      el('ar-json').value = '';
      el('ar-var-search').value = '';
      Adm.activeFormulaEl = null;

      // Default: builder, satu kondisi sederhana kosong.
      Adm.combinator = 'all';
      Adm.condRows = [newCondition('simple')];

      var cls = r ? AdminLogic.classifySimpleGroup(r.when, isKnownField) : null;
      if (cls && cls.simple) {
        Adm.combinator = cls.combinator;
        Adm.condRows = cls.conditions;
        showBuilder(true);
      } else if (r) {
        // Rule kompleks (roster/bersarang/field tak dikenal) → editor JSON otomatis.
        el('ar-json').value = JSON.stringify(r.when, null, 2);
        updateAdvNote(true);
        showBuilder(false);
      } else {
        showBuilder(true);
      }
      el('ar-combinator').value = Adm.combinator;
      renderConditions();
      renderVarPanel();
      UiFx.openDialog(el('ar-dialog'));
      wireAutoGrow(el('ar-dialog'));
    }

    el('ar-add').addEventListener('click', function () { openRuleDialog(null); });
    el('ar-cancel').addEventListener('click', function () { UiFx.closeDialog(el('ar-dialog')); });

    function currentWhen() {
      if (isAdvancedRule()) return AdminLogic.parseAdvancedWhen(el('ar-json').value);
      syncCondRows();
      return AdminLogic.buildSimpleGroup(Adm.combinator, Adm.condRows, fieldMeta);
    }

    el('ar-save').addEventListener('click', function () {
      var showErr = function (msg) {
        el('ar-error').textContent = msg;
        el('ar-error').classList.remove('hidden');
      };
      el('ar-error').classList.add('hidden');
      var w = currentWhen();
      if (!w.ok) { showErr(w.error); return; }
      var payload = {
        rule_id: el('ar-rule-id').value.trim(),
        severity: el('ar-severity').value, message: el('ar-message').value, when: w.when
      };
      var call = Adm.editingR
        ? gsRun('updateRule', Adm.pw, Adm.editingR, payload)
        : gsRun('createRule', Adm.pw, Adm.jenis, payload);
      UiFx.btnBusy(el('ar-save'), true, 'Menyimpan…');
      call.then(function (res) {
        UiFx.btnBusy(el('ar-save'), false);
        if (!(res && res.ok)) { showErr(serverError(res)); return; }
        UiFx.closeDialog(el('ar-dialog'));
        UiFx.toast('Rule tersimpan.');
        loadAll();
      }).catch(function () {
        UiFx.btnBusy(el('ar-save'), false);
        showErr('Gagal terhubung ke server.');
      });
    });

    // -- preview: evaluator yang SAMA dengan submit, dijalankan di server --

    // Isi template: HANYA variabel yang benar-benar dipakai kondisi rule ini —
    // bukan seluruh daftar pertanyaan, supaya admin tak perlu menyisir field
    // yang tak relevan. Kalau kondisi belum valid/tak menyebut field pertanyaan
    // apa pun (mis. cuma field computed), fallback ke semua field aktif supaya
    // tombol tetap berguna.
    el('ar-preview-template').addEventListener('click', function () {
      var w = currentWhen();
      var used = w.ok ? AdminLogic.fieldsUsedInWhen(w.when) : [];
      var relevant = Adm.questions.filter(function (q) {
        return q.active && used.indexOf(q.question_id) !== -1;
      });
      if (!relevant.length) relevant = Adm.questions.filter(function (q) { return q.active; });
      el('ar-preview-answers').value = JSON.stringify(AdminLogic.buildAnswersTemplate(relevant), null, 2);
      autoGrow(el('ar-preview-answers'));
    });

    el('ar-preview-run').addEventListener('click', function () {
      var resEl = el('ar-preview-result');
      var compEl = el('ar-preview-computed');
      var show = function (text, cls) {
        resEl.textContent = text;
        resEl.className = 'text-sm font-semibold ' + cls;
        resEl.classList.remove('hidden');
        UiFx.replayAnim(resEl, 'anim-in');
      };
      compEl.classList.add('hidden');
      var w = currentWhen();
      if (!w.ok) { show('Kondisi belum valid: ' + w.error, 'text-red-600'); return; }
      var answers = {};
      var raw = el('ar-preview-answers').value.trim();
      if (raw) {
        try { answers = JSON.parse(raw); }
        catch (e) { show('Contoh jawaban bukan JSON valid.', 'text-red-600'); return; }
      }
      resEl.innerHTML = '<span class="spin"></span>Menjalankan…';
      resEl.className = 'text-sm font-semibold text-slate-500';
      resEl.classList.remove('hidden');
      gsRun('previewRule', Adm.pw, Adm.jenis, w.when, answers)
        .then(function (res) {
          if (!(res && res.ok)) { show(serverError(res), 'text-red-600'); return; }
          show(res.triggered ? '⚠ TERPICU — record seperti ini akan ditandai anomali'
                             : '✓ TIDAK terpicu untuk contoh jawaban ini',
               res.triggered ? 'text-amber-700' : 'text-emerald-700');
          // tampilkan nilai computed fields hasil augment server
          var computed = {};
          Adm.fields.forEach(function (f) {
            if (f.source === 'computed' && res.answers && res.answers[f.id] !== undefined) {
              computed[f.id] = res.answers[f.id];
            }
          });
          if (Object.keys(computed).length) {
            compEl.textContent = 'Computed: ' + JSON.stringify(computed);
            compEl.classList.remove('hidden');
          }
        })
        .catch(function () { show('Gagal terhubung ke server.', 'text-red-600'); });
    });
  </script>
</body>
</html>
