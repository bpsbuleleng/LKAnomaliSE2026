        if (isAnswerFilterActive(flt)) cw.classList.add('viz-active');
        cw.addEventListener('click', function () { toggleAnswerFilter(flt); });
        var col = document.createElement('div');
        col.className = 'viz-col w-full';
        col.style.height = maxCount > 0 && b.count > 0
          ? Math.max(3, Math.round((b.count / maxCount) * 100)) + '%'
          : '0';
        cw.appendChild(col);
        plot.appendChild(cw);
      });
      wrap.appendChild(plot);

      var axis = document.createElement('div');
      axis.className = 'flex justify-between text-[10px] text-slate-400 mt-1 viz-num';
      var a0 = document.createElement('span');
      a0.textContent = vizFmtNum(h.bins[0].x0, dec);
      var a1 = document.createElement('span');
      a1.textContent = vizFmtNum(h.bins[h.bins.length - 1].x1, dec);
      axis.appendChild(a0);
      axis.appendChild(a1);
      wrap.appendChild(axis);

      var st = document.createElement('p');
      st.className = 'text-xs text-slate-500 mt-2';
      st.textContent = 'Min ' + vizFmtNum(stats.min) + ' · Median ' + vizFmtNum(stats.median) +
        ' · Rata-rata ' + vizFmtNum(stats.mean) + ' · Maks ' + vizFmtNum(stats.max);
      wrap.appendChild(st);
      if (h.bins.length > 1) {
        var peak = document.createElement('p');
        peak.className = 'text-xs text-slate-400 mt-0.5';
        peak.textContent = 'Terbanyak: ' + vizFmtNum(maxBin.count, 0) + ' pada rentang ' +
          vizFmtNum(maxBin.x0, dec) + '–' + vizFmtNum(maxBin.x1, dec);
        wrap.appendChild(peak);
      }
      return wrap;
    }

    // Teks/KBLI: nilai terpopuler, bisa diklik jadi filter. KBLI menampilkan
    // huruf kategori (VizLogic.kbliKategori) + judul KBLI di tooltip (judul
    // di-fetch sekali lewat ensureKbli). KECUALI nama orang (roster anggota
    // keluarga): halaman ini bisa dibuka tanpa login, jadi ISI teksnya tidak
    // ditampilkan — hanya terisi/kosong + jumlah nilai unik.
    function vizTextChart(q, vals) {
      var wrap = document.createElement('div');
      wrap.className = 'space-y-1';
      var tv = VizLogic.topValues(vals.values, 8);
      var privasi = q.roster_group === 'anggota_keluarga' && (q.type === 'text' || q.type === 'textarea');
      if (privasi) {
        var maxTK = Math.max(vals.values.length, vals.empty);
        wrap.appendChild(vizBarRow({ label: 'Terisi', count: vals.values.length, max: maxTK, total: vals.rows, muted: false, filter: null }));
        wrap.appendChild(vizBarRow({ label: 'Tidak diisi', count: vals.empty, max: maxTK, total: vals.rows, muted: true, filter: emptyFilterFor(q) }));
        var note = document.createElement('p');
        note.className = 'text-xs text-slate-400 mt-1';
        note.textContent = tv.uniqueCount + ' nilai unik — isi teks tidak ditampilkan (data pribadi).';
        wrap.appendChild(note);
        return wrap;
      }

      var isKbli = q.type === 'kbli';
      var judulMap = {};
      if (isKbli) {
        if (App.state.kbliOptions) {
          App.state.kbliOptions.forEach(function (o) { judulMap[o.kode] = o.nama; });
        } else if (!Viz.kbliFetching) {
          // Judul KBLI belum ter-cache (halaman ini bisa dibuka tanpa login):
          // ambil sekali, lalu render ulang supaya tooltip memuat judulnya.
          Viz.kbliFetching = true;
          ensureKbli().then(function () { renderViz(); }).catch(function () {});
        }
      }

      var rows = tv.items.map(function (it) {
        var kat = isKbli ? VizLogic.kbliKategori(it.value) : '';
        return {
          label: it.value + (kat ? ' · ' + kat : ''), count: it.count, muted: false,
          tipExtra: isKbli ? (judulMap[it.value] || '') : '',
          filter: {
            qid: q.question_id, roster_group: q.roster_group || '', kind: 'eq', value: it.value,
            label: q.question_id + ' = ' + it.value + (kat ? ' (' + kat + ')' : '')
          }
        };
      });
      if (tv.otherCount > 0) rows.push({ label: '(nilai lainnya)', count: tv.otherCount, muted: false, tipExtra: '', filter: null });
      if (vals.empty > 0) rows.push({ label: 'Tidak diisi', count: vals.empty, muted: true, tipExtra: '', filter: emptyFilterFor(q) });
      var max = 0;
      rows.forEach(function (r) { if (r.count > max) max = r.count; });
      rows.forEach(function (r) {
        wrap.appendChild(vizBarRow({ label: r.label, count: r.count, max: max, total: vals.rows, muted: r.muted, tipExtra: r.tipExtra, filter: r.filter }));
      });
      var uniq = document.createElement('p');
      uniq.className = 'text-xs text-slate-400 mt-1';
      uniq.textContent = tv.uniqueCount + ' nilai unik.';
      wrap.appendChild(uniq);
      return wrap;
    }

    // ---- tabulasi per dimensi (tab Kecamatan/Desa/SLS/PML/PPL) ----

    function vizTabSection(q, slice) {
      var sec = document.createElement('div');
      // mt-auto: menempel ke dasar kartu (kartu flex-col yang diregangkan
      // grid) supaya tombol tabulasi sejajar antar kartu sebaris.
      sec.className = 'mt-auto pt-2 border-t border-slate-100';
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('data-testid', 'viz-tab-toggle');
      btn.className = 'min-h-[36px] text-xs font-semibold text-orange-700 active:text-orange-800';
      var panel = document.createElement('div');
      panel.className = 'mt-1 hidden';
      var open = !!Viz.openTab[q.question_id];
      btn.textContent = open ? 'Tutup tabulasi' : 'Lihat tabulasi';
      if (open) {
        panel.classList.remove('hidden');
        fillVizTabPanel(panel, q, slice);
      }
      btn.addEventListener('click', function () {
        if (Viz.openTab[q.question_id]) {
          delete Viz.openTab[q.question_id];
          panel.classList.add('hidden');
          panel.innerHTML = '';
          btn.textContent = 'Lihat tabulasi';
        } else {
          Viz.openTab[q.question_id] = 'kec';
          panel.classList.remove('hidden');
          fillVizTabPanel(panel, q, slice);
          btn.textContent = 'Tutup tabulasi';
        }
      });
      sec.appendChild(btn);
      sec.appendChild(panel);
      return sec;
    }

    function fillVizTabPanel(panel, q, slice) {
      panel.innerHTML = '';
      var dim = Viz.openTab[q.question_id] || 'kec';
      var tabs = document.createElement('div');
      tabs.className = 'viz-scrollbox flex gap-1 overflow-x-auto pb-1';
      VizLogic.DIMS.forEach(function (d) {
        var b = document.createElement('button');
        b.type = 'button';
        b.setAttribute('data-testid', 'viz-tab-' + d.id);
        b.className = 'h-8 px-2.5 rounded-lg text-xs font-medium shrink-0 ' +
          (d.id === dim ? 'bg-orange-600 text-white' : 'bg-slate-100 text-slate-600 active:bg-slate-200');
        b.textContent = d.label;
        b.addEventListener('click', function () {
          Viz.openTab[q.question_id] = d.id;
          fillVizTabPanel(panel, q, slice);
        });
        tabs.appendChild(b);
      });
      panel.appendChild(tabs);
      panel.appendChild(vizTableEl(VizLogic.tabulate(slice, q, dim), q, dim));
    }

    function vizTableEl(t, q, dim) {
      var dimLabel = '';
      VizLogic.DIMS.forEach(function (d) { if (d.id === dim) dimLabel = d.label; });
      var optionLabel = {};
      (q.options || []).forEach(function (o) { optionLabel[String(o.value)] = o.label; });

      var box = document.createElement('div');
      box.className = 'viz-scrollbox overflow-x-auto max-h-72 overflow-y-auto border border-slate-100 rounded-lg mt-1';
      var table = document.createElement('table');
      table.className = 'min-w-full text-xs';
      table.setAttribute('data-testid', 'viz-table');

      var thead = document.createElement('thead');
      var hr = document.createElement('tr');
      function th(text, first, title) {
        var cell = document.createElement('th');
        cell.className = 'px-2 py-1.5 font-medium text-slate-500 bg-slate-50 sticky top-0 whitespace-nowrap ' +
          (first ? 'text-left' : 'text-right');
        cell.textContent = text;
        if (title) cell.title = title;
        hr.appendChild(cell);
      }
      th(dimLabel, true);
      t.columns.forEach(function (col) { th(col, false, optionLabel[col] || ''); });
      thead.appendChild(hr);
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      function bodyRow(label, cells, isTotal) {
        var tr = document.createElement('tr');
        tr.className = isTotal
          ? 'border-t border-slate-200 font-semibold bg-slate-50'
          : 'border-t border-slate-100';
        var lc = document.createElement('td');
        lc.className = 'px-2 py-1 text-slate-700 max-w-[14rem] truncate';
        lc.textContent = label;
        lc.title = label;
        tr.appendChild(lc);
        cells.forEach(function (c) {
          var td = document.createElement('td');
          td.className = 'px-2 py-1 text-right text-slate-700 viz-num whitespace-nowrap';
          td.textContent = vizFmtNum(c);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      t.rows.forEach(function (r) { bodyRow(r.label, r.cells, false); });
      bodyRow(t.total.label, t.total.cells, true);
      table.appendChild(tbody);
      box.appendChild(table);
      return box;
    }

    // ---- wiring event (sekali saat init) ----

    function setVizJenis(j) {
      if (Viz.jenis === j) return;
      Viz.jenis = j;
      // Filter nilai jawaban terikat qid milik jenis lama — tidak relevan
      // (dan tidak pernah cocok) di jenis baru, buang supaya tidak menyaring hantu.
      Viz.filters.answers = [];
      setVizJenisButtons();
      renderViz();
    }
    function setVizJenisButtons() {
      [['viz-jenis-usaha', 'usaha'], ['viz-jenis-keluarga', 'keluarga']].forEach(function (d) {
        var active = Viz.jenis === d[1];
        el(d[0]).className = 'h-10 px-5 rounded-lg text-sm font-semibold ' +
          (active ? 'bg-orange-600 text-white' : 'text-slate-600 active:bg-slate-100');
        el(d[0]).setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }

    function initViz() {
      el('goto-app-btn').addEventListener('click', function () {
        if (App.state.pml) enterDashboard();
        else showView('login');
      });
      el('login-back-viz').addEventListener('click', enterViz);
      el('open-viz-btn').addEventListener('click', enterViz);
      el('viz-retry').addEventListener('click', loadVizData);
      el('viz-reload').addEventListener('click', function () { if (!Viz.loading) loadVizData(); });
      el('viz-reset').addEventListener('click', function () {
        Viz.filters.kdkec = '';
        Viz.filters.kddesa = '';
        Viz.filters.kdsls = '';
        Viz.filters.pml = '';
        Viz.filters.ppl = '';
        Viz.filters.anomali = '';
        Viz.filters.answers = [];
        renderViz();
      });
      [
        ['viz-filter-kec', 'kdkec', ['kddesa', 'kdsls']],
        ['viz-filter-desa', 'kddesa', ['kdsls']],
        ['viz-filter-sls', 'kdsls', []],
        ['viz-filter-pml', 'pml', []],
        ['viz-filter-ppl', 'ppl', []],
        ['viz-filter-anomali', 'anomali', []]
      ].forEach(function (def) {
        el(def[0]).addEventListener('change', function () {
          Viz.filters[def[1]] = el(def[0]).value;
          def[2].forEach(function (child) { Viz.filters[child] = ''; }); // turunan ikut reset
          renderViz();
        });
      });
      el('viz-include-draft').addEventListener('change', function () {
        Viz.filters.includeDraft = el('viz-include-draft').checked;
        renderViz();
      });
      el('viz-jenis-usaha').addEventListener('click', function () { setVizJenis('usaha'); });
      el('viz-jenis-keluarga').addEventListener('click', function () { setVizJenis('keluarga'); });
      setVizJenisButtons();
      initVizTooltip();
    }

    // Tooltip hover bersama untuk semua mark ber-data-tip (bar & bin
    // histogram). Delegasi di container kartu — mark dibuat ulang tiap render,
    // listener cukup dipasang sekali di sini. Tooltip memperkaya, tidak
    // menggantikan: angka tetap tertulis di ujung bar & tersedia di tabulasi.
    function initVizTooltip() {
      var tip = el('viz-tooltip');
      var box = el('viz-cards');
      function tipTargetOf(ev) {
        return ev.target && ev.target.closest ? ev.target.closest('[data-tip]') : null;
      }
      function place(ev) {
        var x = ev.clientX + 12;
        var y = ev.clientY + 16;
        if (x + tip.offsetWidth > window.innerWidth - 8) x = window.innerWidth - tip.offsetWidth - 8;
        if (y + tip.offsetHeight > window.innerHeight - 8) y = ev.clientY - tip.offsetHeight - 10;
        tip.style.left = Math.max(4, x) + 'px';
        tip.style.top = Math.max(4, y) + 'px';
      }
      box.addEventListener('pointerover', function (ev) {
        var t = tipTargetOf(ev);
        if (!t) return;
        tip.textContent = t.getAttribute('data-tip');
        tip.classList.remove('hidden');
        place(ev);
      });
      box.addEventListener('pointermove', function (ev) {
        if (tip.classList.contains('hidden')) return;
        var t = tipTargetOf(ev);
        if (!t) { tip.classList.add('hidden'); return; }
        tip.textContent = t.getAttribute('data-tip');
        place(ev);
      });
      box.addEventListener('pointerout', function (ev) {
        var t = tipTargetOf(ev);
        if (!t) return;
        // Masih pindah ke elemen anak dari mark yang sama → biarkan tampil.
        if (ev.relatedTarget && t.contains(ev.relatedTarget)) return;
        tip.classList.add('hidden');
      });
      // Mark diklik (jadi filter) → chart dirender ulang; sembunyikan supaya
      // tooltip tidak "menggantung" tanpa mark di bawah kursor.
      box.addEventListener('click', function () { tip.classList.add('hidden'); });

      // Scrollbar "muncul saat dipakai": tandai kontainer yang sedang digulir
      // dengan .viz-scrolling (dilepas 800ms setelah gulir berhenti). Event
      // scroll tidak bubble — pakai fase capture di container kartu.
      box.addEventListener('scroll', function (ev) {
        var t = ev.target;
        if (!t || !t.classList) return;
        if (!t.classList.contains('viz-chart-scroll') && !t.classList.contains('viz-scrollbox')) return;
        t.classList.add('viz-scrolling');
        clearTimeout(t._vizScrollTimer);
        t._vizScrollTimer = setTimeout(function () { t.classList.remove('viz-scrolling'); }, 800);
      }, true);
    }

    // ==== FAB scroll-to-top ====
    window.addEventListener('scroll', function () {
      el('fab-top').classList.toggle('hidden', window.scrollY < 300);
    });
    el('fab-top').addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    initCascades();
    initViz();
    // Identitas PML dipulihkan dari localStorage (kalau ada) — tapi halaman
    // awal SELALU dashboard visualisasi; tombol "Lembar Kerja" di sana yang
    // membawa PML ber-sesi langsung masuk tanpa login ulang.
    restoreSession();
    enterViz();
  </script>
</body>
</html>
