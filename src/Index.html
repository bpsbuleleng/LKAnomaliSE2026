  <!-- FAB scroll-to-top — muncul setelah scroll turun cukup jauh -->
  <button id="fab-top" data-testid="fab-top" type="button"

    &uarr;

  <?!= include('UiFx'); ?>

  <?!= include('SearchableSelect'); ?>
  <?!= include('DraftLogic'); ?>

  <?!= include('VizLogic'); ?>

  <script>
    // State aplikasi — identitas PML & cache hidup di memory selama sesi
    // halaman. Identitas PML (nama/email/sobatId, TANPA password) juga
    // disalin ke localStorage (lihat SESSION_KEY) supaya refresh halaman
    // tidak memaksa login ulang. Draft offline ada di IndexedDB (DraftStore).
    var App = { state: { pml: null, wilayahRows: null, questionCache: {}, dashboardItems: [] } };
    // Kuesioner yang sedang terbuka + state sync engine-nya.
    var Q = { draft: null, prefilling: false, debounceTimer: null, retryTimer: null, inFlight: false };
    var sel = {}; // instance SearchableSelect per level wilayah

    var LOGIN_ERROR_MESSAGES = {
      EMAIL_NOT_FOUND: 'Email tidak terdaftar sebagai petugas.',
      NOT_PML: 'Email ini terdaftar, tapi bukan akun PML.',
      WRONG_PASSWORD: 'Password salah.'
    };
    var SAVE_ERROR_MESSAGES = {
      INVALID_JENIS: 'Jenis assignment tidak valid.',
      WILAYAH_NOT_ASSIGNED: 'Sub-SLS itu bukan assignment Anda.',
      NOT_FOUND: 'Record tidak ditemukan.',
      FORBIDDEN: 'Record ini bukan milik Anda.'
    };

    function el(id) { return document.getElementById(id); }
    function nowIso() { return new Date().toISOString(); }

    function gsRun(fnName) {
      var args = Array.prototype.slice.call(arguments, 1);
      return new Promise(function (resolve, reject) {
        var runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject);
        runner[fnName].apply(runner, args);
      });
    }

    function showView(name) {
      document.querySelectorAll('.view').forEach(function (v) { v.classList.add('hidden'); });
      var v = el('view-' + name);
      v.classList.remove('hidden');
      UiFx.replayAnim(v, 'view-enter');
    }

    function showLoading(text) {
      el('app-loading-text').textContent = text || 'Memuat…';
      el('app-loading').classList.remove('hidden');
    }
    function hideLoading() { el('app-loading').classList.add('hidden'); }

    // ==== LOGIN ====

    function setLoginError(msg) {
      el('login-error').textContent = msg;
      el('login-error').classList.toggle('hidden', !msg);
      if (msg) UiFx.replayAnim(el('login-error'), 'anim-in');
    }
    function setLoginBusy(busy) {
      UiFx.btnBusy(el('login-submit'), busy, 'Memeriksa…');
    }

    // Identitas PML saja (tanpa password) — dipakai supaya refresh halaman
    // tidak memaksa login ulang. Bukan rahasia: sama dengan yang tampil di
    // sapaan dashboard.
    var SESSION_KEY = 'lka_pml_session';
    function saveSession(pml) {
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(pml)); } catch (e) {}
    }
    function clearSession() {
      try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
    }
    // Pulihkan IDENTITAS saja (tanpa auto-masuk Lembar Kerja) — halaman awal
    // sekarang selalu dashboard visualisasi; tombol "Lembar Kerja" di sana
    // yang membawa PML ber-sesi langsung masuk tanpa login ulang.
    function restoreSession() {
      var raw;
      try { raw = localStorage.getItem(SESSION_KEY); } catch (e) { return false; }
      if (!raw) return false;
      var pml;
      try { pml = JSON.parse(raw); } catch (e) { return false; }
      if (!pml || !pml.email) return false;
      App.state.pml = pml;
      return true;
    }

    el('login-form').addEventListener('submit', function (ev) {
      ev.preventDefault();
      setLoginError('');
      setLoginBusy(true);
      gsRun('login', el('login-email').value, el('login-password').value)
        .then(function (res) {
          setLoginBusy(false);
          if (res && res.ok) {
            App.state.pml = res.pml;
            saveSession(res.pml);
            el('login-password').value = '';
            enterDashboard();
          } else {
            setLoginError(LOGIN_ERROR_MESSAGES[res && res.error] || 'Login gagal. Coba lagi.');
          }
        })
        .catch(function (err) {
          setLoginBusy(false);
          setLoginError('Gagal terhubung ke server. Coba lagi. (' + ((err && err.message) || err) + ')');
        });
    });

    el('logout-btn').addEventListener('click', function () {
      App.state.pml = null;
      App.state.wilayahRows = null;
      App.state.questionCache = {};
      clearSession();
      showView('login');
    });

    // ==== DASHBOARD ====

    function enterDashboard() {
      stopSyncTimers();
      Q.draft = null;
      el('dashboard-greeting').textContent = 'Halo, ' + App.state.pml.nama;
      showView('dashboard');
      loadRecords();
      // Prefetch referensi selagi online, supaya kuesioner BARU tetap bisa
      // dibuka saat koneksi putus (offline-safe bukan cuma untuk edit).
      ensureWilayah().catch(function () {});
      ensureQuestions('usaha').catch(function () {});
      ensureQuestions('keluarga').catch(function () {});
      ensureKbli().catch(function () {});
    }

    function loadRecords() {
      var email = App.state.pml.email;
      el('record-list').innerHTML = '';
      el('record-empty').classList.add('hidden');
      el('record-filtered-empty').classList.add('hidden');
      el('record-loading').classList.remove('hidden');
      // Server bisa tak terjangkau (offline) → dashboard tetap tampil dari
      // draft lokal, jangan sampai record "hilang" dari daftar.
      var serverP = gsRun('listRecords', email)
        .then(function (res) { return (res && res.ok && res.records) || []; })
        .catch(function () { return null; });
      var localP = DraftStore.getAll(email).catch(function () { return []; });
      Promise.all([serverP, localP]).then(function (vals) {
        el('record-loading').classList.add('hidden');
        var items = DraftLogic.mergeDashboard(vals[0] || [], vals[1]);
        App.state.dashboardItems = items;
        populateFilterOptions(items);
        if (!items.length) {
          el('record-empty').classList.remove('hidden');
          UiFx.replayAnim(el('record-empty'), 'anim-in');
          return;
        }
        renderRecordList();
      });
    }

    // ==== FILTER DAFTAR RECORD (client-side, atas data yang sudah termuat) ====

    // Opsi Wilayah/PPL/Anomali diisi dinamis dari record yang termuat — cuma
    // menampilkan pilihan yang benar-benar relevan, bukan daftar statis.
    function populateFilterOptions(items) {
      var wilayahSel = el('filter-wilayah'), pplSel = el('filter-ppl'), anomaliSel = el('filter-anomali');
      var prevWilayah = wilayahSel.value, prevPpl = pplSel.value, prevAnomali = anomaliSel.value;
      var wilayahSet = {}, pplSet = {}, anomaliSet = {};
      items.forEach(function (it) {
        if (it.nmkec) wilayahSet[it.nmkec] = true;
        if (it.nmppl) pplSet[it.nmppl] = true;
        (it.anomalies || []).forEach(function (a) { if (a.message) anomaliSet[a.message] = true; });
      });
      function rebuild(sel, keep, values, allLabel) {
        sel.innerHTML = '';
        sel.appendChild(new Option(allLabel, ''));
        values.sort().forEach(function (v) { sel.appendChild(new Option(v, v)); });
        if (values.indexOf(keep) !== -1) sel.value = keep;
      }
      rebuild(wilayahSel, prevWilayah, Object.keys(wilayahSet), 'Semua Wilayah');
      rebuild(pplSel, prevPpl, Object.keys(pplSet), 'Semua PPL');
      var anomaliValues = Object.keys(anomaliSet).sort();
      anomaliSel.innerHTML = '';
      anomaliSel.appendChild(new Option('Semua Anomali', ''));
      anomaliSel.appendChild(new Option('Tidak ada anomali', '__none__'));
      anomaliValues.forEach(function (v) { anomaliSel.appendChild(new Option(v, v)); });
      if (prevAnomali === '__none__' || anomaliValues.indexOf(prevAnomali) !== -1) anomaliSel.value = prevAnomali;
    }

    function matchesFilters(item) {
      var status = el('filter-status').value;
      var wilayah = el('filter-wilayah').value;
      var anomali = el('filter-anomali').value;
      var ppl = el('filter-ppl').value;
      if (status && item.status !== status) return false;
      if (wilayah && item.nmkec !== wilayah) return false;
      if (ppl && item.nmppl !== ppl) return false;
      if (anomali === '__none__' && (item.anomalies || []).length > 0) return false;
      if (anomali && anomali !== '__none__' && !(item.anomalies || []).some(function (a) { return a.message === anomali; })) return false;
      return true;
    }

    function renderRecordList() {
      var items = App.state.dashboardItems || [];
      var filtered = items.filter(matchesFilters);
      el('record-list').innerHTML = '';
      el('record-filtered-empty').classList.toggle('hidden', !(items.length > 0 && filtered.length === 0));
      if (!filtered.length) return;
      filtered.forEach(function (item) { el('record-list').appendChild(dashCard(item)); });
      UiFx.staggerIn(el('record-list').children);
    }

    ['filter-status', 'filter-wilayah', 'filter-anomali', 'filter-ppl'].forEach(function (id) {
      el(id).addEventListener('change', renderRecordList);
    });

    // "09/07 14:32" — tanggal kompak waktu lokal untuk baris chip kartu.
    function fmtUpdated(iso) {
      var d = new Date(iso);
      if (isNaN(d)) return '';
      function p(n) { return (n < 10 ? '0' : '') + n; }
      return p(d.getDate()) + '/' + p(d.getMonth() + 1) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }

    var CARD_CHIP = 'text-[11px] font-semibold px-1.5 py-0.5 rounded-full ';

    function dashCard(item) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('data-testid', 'record-card');
      btn.className = 'w-full text-left bg-white rounded-xl shadow-sm p-3 active:bg-orange-50';
      var wilayah = item.idsubsls
        ? (item.nmdesa ? item.nmdesa + ' · ' + item.nmsls + ' · Sub-SLS ' + item.kdsubsls
                       : 'Sub-SLS ' + item.idsubsls)
        : 'Wilayah belum dipilih';
      var jenisCls = item.jenis === 'usaha' ? 'bg-indigo-100 text-indigo-700' : 'bg-teal-100 text-teal-700';
      var statusCls = item.status === 'draft' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700';
      var badges =
        '<span class="' + CARD_CHIP + jenisCls + '">' + item.jenis + '</span>' +
        '<span class="' + CARD_CHIP + statusCls + '">' + item.status + '</span>';
      // Flag anomali — hanya untuk record submitted (rule baru jalan saat
      // submit; draft belum diperiksa jadi tidak diberi flag apa pun).
      if (item.status === 'submitted') {
        var an = item.anomalies || [];
        var hasError = an.some(function (a) { return a.severity === 'error'; });
        badges += an.length
          ? '<span data-testid="anomaly-flag" class="' + CARD_CHIP +
              (hasError ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-800') +
              '">&#9888; ' + an.length + ' anomali</span>'
          : '<span data-testid="anomaly-flag" class="' + CARD_CHIP + 'bg-emerald-50 text-emerald-600">&#10003; 0 anomali</span>';
      }
      if (item.unsynced) {
        badges += '<span data-testid="unsynced-badge" class="' + CARD_CHIP + 'bg-amber-100 text-amber-800 border border-amber-300">belum sync</span>';
      }
      // Cuma muncul untuk akun organik (satu-satunya yang melihat record
      // PML lain) — bandingkan pml_email (otoritatif), BUKAN nmpml (nama
      // PML yang di-assign ke Sub-SLS-nya, bisa beda dari pembuat record).
      if (item.pml_email && item.pml_email !== App.state.pml.email) {
        badges += '<span data-testid="owner-badge" class="' + CARD_CHIP + 'bg-slate-200 text-slate-700">' +
          (item.nmpml || item.pml_email) + '</span>';
      }
      // Judul: keluarga = nama anggota 1 / anggota 2, usaha = nama usaha.
      // Belum ada nama → baris judul memakai wilayah (seperti sebelumnya).
      btn.innerHTML =
        '<div class="flex flex-wrap items-center gap-1 mb-1">' + badges +
          '<span class="ml-auto pl-1 text-[11px] text-slate-400 shrink-0">' + fmtUpdated(item.updated) + '</span></div>' +
        '<p data-testid="record-card-title" class="text-sm font-semibold leading-snug truncate"></p>' +
        '<p data-testid="record-card-wilayah" class="text-xs text-slate-500 truncate mt-0.5"></p>';
      var titleEl = btn.querySelector('[data-testid="record-card-title"]');
      var wilEl = btn.querySelector('[data-testid="record-card-wilayah"]');
      if (item.judul) {
        titleEl.textContent = item.judul;
        wilEl.textContent = wilayah;
      } else {
        titleEl.textContent = wilayah;
        wilEl.remove();
      }
      btn.addEventListener('click', function () {
        // Server = sumber kebenaran saat draft lokal sudah bersih (tak ada
        // editan belum terkirim); lokal menang HANYA saat masih dirty atau
        // belum pernah punya record server.
        if (item.record_id && !item.unsynced) openExistingRecord(item.record_id, item.localId);
        else if (item.localId) openLocalDraft(item.localId);
        else openExistingRecord(item.record_id, null);
      });
      return btn;
    }

    // Jenis dipilih SEBELUM kuesioner terbuka (alur brief poin 3).
    el('new-record-btn').addEventListener('click', function () {
      UiFx.openDialog(el('jenis-dialog'));
    });
    el('jenis-cancel').addEventListener('click', function () {
      UiFx.closeDialog(el('jenis-dialog'));
    });
    el('new-usaha').addEventListener('click', function () { startNewRecord('usaha'); });
    el('new-keluarga').addEventListener('click', function () { startNewRecord('keluarga'); });

    function startNewRecord(jenis) {
      UiFx.closeDialog(el('jenis-dialog'));
      var localId = 'L-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      openQuestionnaire(DraftLogic.newDraft(localId, App.state.pml.email, jenis, nowIso()), null);
    }

    function openLocalDraft(localId) {
      DraftStore.get(localId).then(function (d) {
        if (d) openQuestionnaire(d, null);
      });
    }

    function openExistingRecord(recordId, fallbackLocalId) {
      showLoading('Membuka record…');
      gsRun('getRecord', App.state.pml.email, recordId)
        .then(function (res) {
          hideLoading();
          if (res && res.ok) {
            var draft = DraftLogic.fromServerRecord(res.record);
            // owned=false HANYA muncul untuk akun organik membuka record PML
            // lain (lihat RecordLogic.getRecordFor) — buka read-only.
            draft.owned = res.owned !== false;
            openQuestionnaire(draft, res.record.wilayah);
          } else if (fallbackLocalId) {
            // Record server hilang/tak terbaca tapi ada salinan lokal —
            // buka salinan lokal; sync berikutnya membuatnya lagi di server.
            openLocalDraft(fallbackLocalId);
          } else {
            UiFx.toast(SAVE_ERROR_MESSAGES[res && res.error] || 'Gagal membuka record.');
          }
        })
        .catch(function () {
          hideLoading();
          if (fallbackLocalId) openLocalDraft(fallbackLocalId);
          else UiFx.toast('Gagal membuka record — periksa koneksi lalu coba lagi.');
        });
    }

    // ==== WILAYAH CASCADE (dari Fase 1) ====

    function initCascades() {
      sel.kecamatan = createSearchableSelect(el('sel-kecamatan'), { placeholder: 'Pilih Kecamatan', onSelect: onKecamatan });
      sel.desa = createSearchableSelect(el('sel-desa'), { placeholder: 'Pilih Desa', onSelect: onDesa });
      sel.sls = createSearchableSelect(el('sel-sls'), { placeholder: 'Pilih SLS', onSelect: onSls });
      sel.subsls = createSearchableSelect(el('sel-subsls'), { placeholder: 'Pilih Sub-SLS', onSelect: onSubSls });
    }

    function rowsAssigned() { return App.state.wilayahRows || []; }

    function onKecamatan(opt) {
      sel.desa.setOptions(CascadeLogic.desaOptions(rowsAssigned(), opt.kode));
      sel.sls.reset();
      sel.subsls.reset();
      clearPplDisplay();
      onWilayahChanged('');
    }
    function onDesa(opt) {
      sel.sls.setOptions(CascadeLogic.slsOptions(rowsAssigned(), sel.kecamatan.getSelected().kode, opt.kode));
      sel.subsls.reset();
      clearPplDisplay();
      onWilayahChanged('');
    }
    function onSls(opt) {
      sel.subsls.setOptions(CascadeLogic.subSlsOptions(rowsAssigned(),
        sel.kecamatan.getSelected().kode, sel.desa.getSelected().kode, opt.kode));
      clearPplDisplay();
      onWilayahChanged('');
    }
    function onSubSls(opt) {
      loadPpl(opt.idsubsls);
      onWilayahChanged(opt.idsubsls);
    }

    function onWilayahChanged(idsubsls) {
      if (Q.prefilling || !Q.draft) return;
      var before = Q.draft.rev;
      DraftLogic.setWilayah(Q.draft, idsubsls, nowIso());
      if (Q.draft.rev !== before) afterEdit();
    }

    function loadPpl(idsubsls) {
      // Kartu tampil dulu dengan spinner, nama menyusul dari server.
      el('ppl-info').classList.remove('hidden');
      UiFx.replayAnim(el('ppl-info'), 'anim-in');
      el('ppl-loading').classList.remove('hidden');
      el('ppl-names').classList.add('hidden');
      gsRun('getPPL', idsubsls).then(function (res) {
        el('ppl-loading').classList.add('hidden');
        if (res && res.ok) {
          el('ppl-nama').textContent = res.ppl.nmppl || '—';
          el('pml-nama').textContent = res.ppl.nmpml || '—';
          el('ppl-names').classList.remove('hidden');
        } else {
          clearPplDisplay();
        }
      }).catch(function () {
        // offline: sembunyikan lagi; info PPL tampil saat online & dipilih ulang
        clearPplDisplay();
      });
    }
    function clearPplDisplay() {
      el('ppl-info').classList.add('hidden');
      el('ppl-loading').classList.add('hidden');
    }

    function wilayahFromIdsubsls(idsubsls) {
      var rows = rowsAssigned();
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].idsubsls === idsubsls) return rows[i];
      }
      return null;
    }

    function prefillWilayah(w) {
      var rows = rowsAssigned();
      sel.kecamatan.setValue(w.kdkec);
      sel.desa.setOptions(CascadeLogic.desaOptions(rows, w.kdkec));
      sel.desa.setValue(w.kddesa);
      sel.sls.setOptions(CascadeLogic.slsOptions(rows, w.kdkec, w.kddesa));
      sel.sls.setValue(w.kdsls);
      sel.subsls.setOptions(CascadeLogic.subSlsOptions(rows, w.kdkec, w.kddesa, w.kdsls));
      sel.subsls.setValue(w.kdsubsls);
      loadPpl(w.idsubsls);
    }

    // ==== KUESIONER: buka + render dinamis ====

    function ensureWilayah() {
      if (App.state.wilayahRows) return Promise.resolve(App.state.wilayahRows);
      return gsRun('getWilayah', App.state.pml.email).then(function (res) {
        App.state.wilayahRows = (res && res.ok && res.rows) || [];
        return App.state.wilayahRows;
      });
    }

    function ensureQuestions(jenis) {
      if (App.state.questionCache[jenis]) return Promise.resolve(App.state.questionCache[jenis]);
      return gsRun('getQuestions', jenis).then(function (res) {
        App.state.questionCache[jenis] = (res && res.ok && res.questions) || [];
        return App.state.questionCache[jenis];
      });
    }

    // Daftar kode KBLI (field r13g) — statis, cukup diambil sekali per sesi.
    function ensureKbli() {
      if (App.state.kbliOptions) return Promise.resolve(App.state.kbliOptions);
      return gsRun('getKbliOptions').then(function (res) {
        var list = (res && res.ok && res.options) || [];
        App.state.kbliOptions = list.map(function (d) { return { kode: d.kode, nama: d.judul }; });
        return App.state.kbliOptions;
      });
    }

    function openQuestionnaire(draft, wilayahSnapshot) {
      Q.draft = draft;
      Q.prefilling = true;
      stopSyncTimers();
      // owned=false HANYA terjadi kalau akun organik membuka record PML lain
      // (lihat openExistingRecord) — seluruh view jadi "lihat saja", TIDAK
      // ada jalur simpan/submit/hapus dari sini (server tetap menegakkan
      // kepemilikan di applySaveDraft/submitRecord/deleteRecord terlepas UI).
      var readOnly = draft.owned === false;
      el('record-title').textContent = readOnly ? 'Lihat Record' : (draft.record_id ? 'Edit Record' : 'Record Baru');
      el('record-jenis-chip').textContent = draft.jenis;
      el('readonly-banner').classList.toggle('hidden', !readOnly);
      if (readOnly) el('readonly-owner').textContent = draft.pml_email || '';
      el('record-content').classList.toggle('record-readonly', readOnly);
      // inert melengkapi CSS pointer-events: ikut memblokir fokus keyboard,
      // supaya draft read-only tidak pernah jadi dirty & tersimpan ke IndexedDB.
      el('record-content').inert = readOnly;
      el('record-save').classList.toggle('hidden', readOnly);
      el('record-submit').classList.toggle('hidden', readOnly);
      showRecordError('');
      renderStatusChip();
      renderInlineAnomalies();
      clearMissing();
      setSubmitBusy(false);
      // Kunci submit sampai pertanyaan selesai dirender — kalau tidak,
      // penanda field kurang bisa menempel ke DOM yang belum/segera diganti.
      el('record-submit').disabled = true;
      el('anomaly-dialog').classList.add('hidden');
      clearPplDisplay();
      sel.kecamatan.reset(); sel.desa.reset(); sel.sls.reset(); sel.subsls.reset();
      // Skeleton selagi pertanyaan dimuat (langsung terlihat saat view masuk).
      el('questions-container').innerHTML =
        UiFx.skeletonList(4, 'h-12') + '<div class="skel h-24 rounded-xl" aria-hidden="true"></div>';
      el('roster-container-top').innerHTML = '';
      el('roster-container').innerHTML = '';
      el('record-delete').classList.toggle('hidden', readOnly || (!draft.record_id && draft.rev === 0));
      refreshSyncIndicator();
      showView('record');

      // KBLI TIDAK BOLEH memblokir keseluruhan kuesioner (termasuk keluarga,
      // yang tidak pernah butuh field ini) — kalau gagal/belum ter-cache
      // (mis. baru offline sebelum prefetch dashboard selesai), field r13g
      // cukup tampil tanpa opsi dulu, bukan menggagalkan seluruh render.
      Promise.all([
        ensureWilayah(), ensureQuestions(draft.jenis),
        ensureKbli().catch(function () { return App.state.kbliOptions || []; })
      ]).then(function (vals) {
        var rows = vals[0];
        var questions = vals[1];
        var hasAssignment = rows.length > 0;
        el('no-assignment').classList.toggle('hidden', hasAssignment);
        el('wilayah-section').classList.toggle('hidden', !hasAssignment);
        el('record-save').disabled = !hasAssignment;
        el('record-submit').disabled = !hasAssignment;
        if (hasAssignment) {
          sel.kecamatan.setOptions(CascadeLogic.kecamatanOptions(rows));
          var w = (wilayahSnapshot && wilayahSnapshot.idsubsls)
            ? wilayahSnapshot
            : wilayahFromIdsubsls(draft.idsubsls);
          if (w && w.idsubsls) prefillWilayah(w);
        }
        renderQuestionnaire(questions, draft);
        Q.prefilling = false;
        // Lanjutkan sync draft yang masih dirty (mis. dibuat saat offline).
        if (DraftLogic.isDirty(draft)) attemptSync();
      }).catch(function () {
        Q.prefilling = false;
        el('questions-container').innerHTML = '';
        showRecordError('Gagal memuat kuesioner — periksa koneksi lalu coba lagi.');
      });
    }

    function renderQuestionnaire(questions, draft) {
      var qc = el('questions-container');
      var rcTop = el('roster-container-top');
      var rc = el('roster-container');
      qc.innerHTML = '';
      rcTop.innerHTML = '';
      rc.innerHTML = '';
      var flat = [];
      var groups = {};
      var groupOrder = [];
      questions.forEach(function (q) {
        if (q.roster_group) {
          if (!groups[q.roster_group]) { groups[q.roster_group] = []; groupOrder.push(q.roster_group); }
          groups[q.roster_group].push(q);
        } else {
          flat.push(q);
        }
      });
      flat.forEach(function (q) {
        qc.appendChild(fieldElement(q, draft.answers[q.question_id], function (value) {
          DraftLogic.setAnswer(Q.draft, q.question_id, value, nowIso());
          afterEdit();
        }, ''));
      });
      // Roster anggota keluarga ditaruh di AWAL kuesioner; roster lain
      // (meteran_listrik) tetap di bawah dekat pertanyaan pemicunya (b4r14a).
      groupOrder.forEach(function (g) {
        var target = g === 'anggota_keluarga' ? rcTop : rc;
        target.appendChild(rosterSection(g, groups[g]));
      });
      UiFx.staggerIn(rcTop.children, 25);
      UiFx.staggerIn(qc.children, 25);
      UiFx.staggerIn(rc.children, 25);
      buildToc(flat, groupOrder);
    }

    // ==== SIDEBAR TOC: lompat ke pertanyaan/roster mana pun ====

    function tocLink(nav, label, anchorId) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'block w-full text-left px-2 py-2 min-h-[36px] rounded-lg text-slate-600 active:bg-orange-50 truncate';
      b.textContent = label;
      b.addEventListener('click', function () {
        closeToc();
        var target = document.getElementById(anchorId);
        if (target && target.scrollIntoView) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      nav.appendChild(b);
    }

    function buildToc(flat, groupOrder) {
      var nav = el('toc-list');
      nav.innerHTML = '';
      tocLink(nav, 'Wilayah', 'wilayah-section');
      groupOrder.forEach(function (g) {
        if (g === 'anggota_keluarga') tocLink(nav, rosterTitle(g), 'qanchor-roster-' + g);
      });
      flat.forEach(function (q) { tocLink(nav, q.label, 'qanchor-' + q.question_id); });
      groupOrder.forEach(function (g) {
        if (g !== 'anggota_keluarga') tocLink(nav, rosterTitle(g), 'qanchor-roster-' + g);
      });
    }

    function openToc() {
      el('toc-panel').classList.remove('-translate-x-full');
      el('toc-backdrop').classList.remove('hidden');
    }
    function closeToc() {
      el('toc-panel').classList.add('-translate-x-full');
      el('toc-backdrop').classList.add('hidden');
    }
    el('toc-toggle').addEventListener('click', openToc);
    el('toc-close').addEventListener('click', closeToc);
    el('toc-backdrop').addEventListener('click', closeToc);

    // h-11 = 44px (batas bawah touch target); text-base DIPERTAHANKAN di input
    // teks/angka — font <16px memicu auto-zoom iOS saat fokus.
    var INPUT_CLS = 'w-full h-11 px-3 text-base rounded-xl border border-slate-300 bg-white focus:outline-none focus:ring-2 focus:ring-orange-500';

    /**
     * Grup radio untuk pertanyaan kategorik. Container ber-testid
     * 'q-<id><suffix>' (dipasang caller); tiap opsi 'q-<id><suffix>-opt-<value>'.
     * onChange menerima value bertipe ASLI dari options (angka utk kode).
     */
    function radioGroup(q, value, onChange, testidSuffix) {
      var box = document.createElement('div');
      box.className = 'space-y-2 rounded-xl';
      var name = 'rq-' + q.question_id + (testidSuffix || '');
      (q.options || []).forEach(function (o) {
        var lbl = document.createElement('label');
        lbl.className = 'flex items-center gap-2.5 min-h-[44px] px-3 py-2 rounded-xl border border-slate-300 bg-white cursor-pointer transition-colors has-[:checked]:border-orange-500 has-[:checked]:bg-orange-50 active:bg-orange-50';
        var r = document.createElement('input');
        r.type = 'radio';
        r.name = name;
        r.value = String(o.value);
        r.className = 'w-5 h-5 accent-orange-600 shrink-0';
        r.setAttribute('data-testid', 'q-' + q.question_id + (testidSuffix || '') + '-opt-' + o.value);
        if (value !== undefined && value !== null && value !== '' && String(value) === String(o.value)) {
          r.checked = true;
        }
        r.addEventListener('change', function () { if (r.checked) onChange(o.value); });
        var t = document.createElement('span');
        t.className = 'text-sm leading-snug';
        t.textContent = o.value + '. ' + o.label;
        lbl.appendChild(r);
        lbl.appendChild(t);
        box.appendChild(lbl);
      });
      return box;
    }

    function fieldElement(q, value, onChange, testidSuffix) {
      var wrap = document.createElement('div');
      // py-3 + divide-y milik questions-container → tiap pertanyaan flat
      // punya jarak & garis pembatas jelas. Field roster (testidSuffix
      // terisi) sudah punya spacing dari card roster, jadi tidak perlu ini —
      // dan tidak dapat anchor TOC (cuma section roster yang dirujuk).
      if (!testidSuffix) {
        wrap.className = 'py-2.5 first:pt-0 last:pb-0';
        wrap.id = 'qanchor-' + q.question_id;
      }
      var lbl = document.createElement('label');
      lbl.className = 'block text-sm font-medium mb-1';
      lbl.textContent = q.label + (q.required ? ' *' : '');
      // question_id kecil di samping label — supaya PML bisa mengenali
      // variabel yang sama dengan kode di kuesioner kertas/BPS (label sendiri
      // sudah tidak lagi memuat kode itu, lihat MockData.js).
      var code = document.createElement('span');
      code.className = 'ml-1.5 font-mono font-normal text-xs text-slate-400 select-all';
      code.textContent = q.question_id;
      code.setAttribute('data-testid', 'q-' + q.question_id + (testidSuffix || '') + '-code');
      lbl.appendChild(code);
      wrap.appendChild(lbl);

      var input;
      if (q.type === 'select') {
        // Kategorik = RADIO BUTTON (bukan dropdown) — semua opsi langsung
        // terlihat & mudah disentuh. Dropdown hanya untuk cascading wilayah
        // (SearchableSelect), bukan lewat sini.
        input = radioGroup(q, value, onChange, testidSuffix);
      } else if (q.type === 'textarea') {
        input = document.createElement('textarea');
        input.rows = 3;
        input.className = INPUT_CLS.replace('h-11', 'py-3');
        input.value = value != null ? value : '';
        input.addEventListener('input', function () { onChange(input.value); });
      } else if (q.type === 'number') {
        input = document.createElement('input');
        input.type = 'number';
        input.setAttribute('inputmode', 'decimal');
        input.className = INPUT_CLS;
        input.value = (value === 0 || value) ? value : '';
        input.addEventListener('input', function () {
          onChange(input.value === '' ? '' : Number(input.value));
        });
      } else if (q.type === 'currency') {
        // Tampil "1.234.567" (format id-ID) — angka MURNI (bukan string) yang
        // dikirim ke onChange, supaya rule evaluator tetap menerima number
        // seperti field number biasa. Format hanya diterapkan saat blur, supaya
        // tidak mengganggu posisi kursor selagi mengetik.
        input = document.createElement('input');
        input.type = 'text';
        input.setAttribute('inputmode', 'decimal');
        input.className = INPUT_CLS;
        var fmtID = function (n) { return isNaN(n) ? '' : n.toLocaleString('id-ID'); };
        var parseID = function (str) {
          var cleaned = String(str == null ? '' : str).replace(/[^0-9,]/g, '');
          if (!cleaned) return '';
          return Number(cleaned.replace(',', '.'));
        };
        input.value = (value === 0 || value) ? fmtID(Number(value)) : '';
        input.addEventListener('focus', function () {
          var n = parseID(input.value);
          input.value = n === '' ? '' : String(n).replace('.', ',');
        });
        input.addEventListener('blur', function () {
          var n = parseID(input.value);
          input.value = fmtID(n);
        });
        input.addEventListener('input', function () { onChange(parseID(input.value)); });
      } else if (q.type === 'kbli') {
        // ~1500 kode — pakai SearchableSelect yang sama dengan wilayah
        // (bukan radio/dropdown polos). Value = kode (string), BUKAN objek.
        input = document.createElement('div');
        input.setAttribute('data-name', 'kbli-' + q.question_id + (testidSuffix || ''));
        var kbliSel = createSearchableSelect(input, {
          placeholder: 'Cari kode/judul KBLI...',
          onSelect: function (opt) { onChange(opt.kode); }
        });
        kbliSel.setOptions(App.state.kbliOptions || []);
        if (value) kbliSel.setValue(value);
      } else { // text | date
        input = document.createElement('input');
        input.type = q.type === 'date' ? 'date' : 'text';
        input.className = INPUT_CLS;
        input.value = value != null ? value : '';
        input.addEventListener('input', function () { onChange(input.value); });
      }
      input.setAttribute('data-testid', 'q-' + q.question_id + (testidSuffix || ''));
      wrap.appendChild(input);

      if (q.help) {
        var help = document.createElement('p');
        help.className = 'text-xs text-slate-400 mt-1';
        help.textContent = q.help;
        wrap.appendChild(help);
      }
      return wrap;
    }

    function rosterTitle(group) {
      return group.split('_').map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
    }

    function rosterSection(group, fields) {
      var sec = document.createElement('div');
      sec.className = 'space-y-3';
      sec.id = 'qanchor-roster-' + group; // target scroll dari sidebar TOC
      var head = document.createElement('div');
      head.className = 'flex items-center justify-between';
      var title = document.createElement('p');
      title.className = 'text-sm font-semibold text-slate-600';
      title.textContent = rosterTitle(group);
      // Badge jumlah baris — cermin dari answers['jumlah_<group>'] yang
      // dipelihara DraftLogic tiap tambah/hapus baris.
      var count = document.createElement('span');
      count.setAttribute('data-testid', 'roster-count-' + group);
      count.className = 'text-xs font-semibold px-2 py-1 rounded-full bg-slate-200 text-slate-600';
      head.appendChild(title);
      head.appendChild(count);
      sec.appendChild(head);

      var rowsWrap = document.createElement('div');
      rowsWrap.className = 'space-y-3';
      sec.appendChild(rowsWrap);

      var addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.setAttribute('data-testid', 'roster-add-' + group);
      addBtn.className = 'w-full h-11 rounded-xl border border-dashed border-orange-400 text-orange-700 text-sm font-medium active:bg-orange-50';
      addBtn.textContent = '+ Tambah ' + rosterTitle(group);
      addBtn.addEventListener('click', function () {
        DraftLogic.addRosterRow(Q.draft, group, nowIso());
        afterEdit();
        renderRosterRows(rowsWrap, group, fields, count);
        var last = rowsWrap.lastElementChild;
        if (last) {
          UiFx.replayAnim(last, 'anim-in');
          if (last.scrollIntoView) last.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      });
      sec.appendChild(addBtn);

      renderRosterRows(rowsWrap, group, fields, count);
      return sec;
    }

    function renderRosterRows(rowsWrap, group, fields, countEl) {
      var rows = (Q.draft.answers.roster && Q.draft.answers.roster[group]) || [];
      rowsWrap.innerHTML = '';
      if (countEl) {
        countEl.textContent = rows.length + ' baris';
        UiFx.replayAnim(countEl, 'anim-in');
      }
      if (!rows.length) {
        var empty = document.createElement('p');
        empty.className = 'text-sm text-slate-400';
        empty.textContent = 'Belum ada baris.';
        rowsWrap.appendChild(empty);
        return;
      }
      rows.forEach(function (rowData, i) {
        var card = document.createElement('div');
        card.setAttribute('data-testid', 'roster-row-' + group + '-' + i);
        card.className = 'bg-slate-50 border border-slate-200 rounded-xl p-3 space-y-3';

        var head = document.createElement('div');
        head.className = 'flex items-center justify-between';
        var headLeft = document.createElement('button');
        headLeft.type = 'button';
        headLeft.setAttribute('data-testid', 'roster-toggle-' + group + '-' + i);
        headLeft.className = 'flex items-center gap-2 text-left flex-1 min-h-[44px] -my-2 py-2';
        var chevron = document.createElement('span');
        chevron.className = 'text-slate-400 transition-transform inline-block';
        chevron.textContent = '▾'; // ▾ — expanded (default: SEMUA baris terbuka)
        var no = document.createElement('p');
        no.className = 'text-sm font-semibold';
        no.textContent = '#' + (i + 1);
        headLeft.appendChild(chevron);
        headLeft.appendChild(no);
        var rm = document.createElement('button');
        rm.type = 'button';
        rm.setAttribute('data-testid', 'roster-remove-' + group + '-' + i);
        rm.className = 'h-11 px-3 rounded-lg text-red-600 text-sm font-medium active:bg-red-50 shrink-0';
        rm.textContent = 'Hapus';
        rm.addEventListener('click', function () {
          if (rowsWrap.dataset.removing) return; // tunggu animasi hapus selesai
          rowsWrap.dataset.removing = '1';
          UiFx.animateOut(card, function () {
            delete rowsWrap.dataset.removing;
            DraftLogic.removeRosterRow(Q.draft, group, i, nowIso());
            afterEdit();
            renderRosterRows(rowsWrap, group, fields, countEl);
          });
        });
        head.appendChild(headLeft);
        head.appendChild(rm);
        card.appendChild(head);

        var body = document.createElement('div');
        body.setAttribute('data-testid', 'roster-body-' + group + '-' + i);
        body.className = 'space-y-3';
        fields.forEach(function (q) {
          body.appendChild(fieldElement(q, rowData[q.question_id], function (value) {
            DraftLogic.setRosterField(Q.draft, group, i, q.question_id, value, nowIso());
            afterEdit();
          }, '-' + i));
        });
        card.appendChild(body);

        // Expandable: default SEMUA baris terbuka (supaya alur isi/baca data
        // lama tidak berubah) — collapse murni opsional untuk memangkas
        // scroll saat anggota keluarga banyak.
        headLeft.addEventListener('click', function () {
          var collapsed = body.classList.toggle('hidden');
          chevron.textContent = collapsed ? '▸' : '▾'; // ▸ : ▾
        });
        rowsWrap.appendChild(card);
      });
    }

    // ==== SYNC ENGINE (IndexedDB dulu, server menyusul) ====

    function stopSyncTimers() {
      clearTimeout(Q.debounceTimer);
      clearTimeout(Q.retryTimer);
    }

    // Dipanggil di TIAP edit: tulis lokal SEGERA (debounced), lalu coba server.
    function afterEdit() {
      // Defense-in-depth: record PML lain (dibuka organik) seharusnya sudah
      // inert lewat .record-readonly (lihat openQuestionnaire) — guard ini
      // cuma jaga-jaga kalau ada jalur edit yang lolos (mis. fokus keyboard).
      // Penegakan SUNGGUHAN tetap di server (RecordLogic.applySaveDraft dst).
      if (Q.draft && Q.draft.owned === false) return;
      refreshSyncIndicator();
      // Begitu ada isian, record sudah "ada" (minimal lokal) → bisa dihapus.
      el('record-delete').classList.remove('hidden');
      clearTimeout(Q.debounceTimer);
      Q.debounceTimer = setTimeout(persistLocalThenSync, 600);
    }

    function persistLocalThenSync() {
      var d = Q.draft;
      if (!d) return Promise.resolve();
      return DraftStore.put(d).then(function () { return attemptSync(); });
    }

    // Kirim versi lokal terakhir. Return Promise<boolean> sukses-tidaknya.
    function attemptSync() {
      var d = Q.draft;
      if (!d || !DraftLogic.isDirty(d)) { refreshSyncIndicator(); return Promise.resolve(true); }
      if (Q.inFlight) return Promise.resolve(false);
      Q.inFlight = true;
      var sentRev = d.rev;
      refreshSyncIndicator(true);
      return gsRun('saveDraft', App.state.pml.email, {
        record_id: d.record_id, jenis: d.jenis, idsubsls: d.idsubsls, answers: d.answers
      })
        .then(function (res) {
          Q.inFlight = false;
          if (res && res.ok) {
            DraftLogic.markSynced(d, sentRev, res.record_id, res.updated_at);
            return DraftStore.put(d).then(function () {
              refreshSyncIndicator();
              if (DraftLogic.isDirty(d)) return attemptSync(); // user ngetik saat in-flight
              return true;
            });
          }
          // Error logis dari server (bukan network) → tampilkan, jangan retry buta.
          refreshSyncIndicator();
          showRecordError(SAVE_ERROR_MESSAGES[res && res.error] || 'Gagal menyimpan ke server.');
          return false;
        })
        .catch(function () {
          // Network gagal (offline dsb) → data sudah aman di IndexedDB, retry otomatis.
          Q.inFlight = false;
          refreshSyncIndicator();
          scheduleRetry();
          return false;
        });
    }

    function scheduleRetry() {
      clearTimeout(Q.retryTimer);
      Q.retryTimer = setTimeout(attemptSync, 5000);
    }

    window.addEventListener('online', function () { attemptSync(); });

    function refreshSyncIndicator(syncing) {
      var ind = el('sync-indicator');
      var d = Q.draft;
      var state, text, cls;
      if (syncing) {
        state = 'syncing'; text = 'Menyimpan ke server…'; cls = 'bg-slate-100 text-slate-500';
      } else if (!d || (d.rev === 0 && !d.record_id)) {
        state = 'idle'; text = ''; cls = '';
      } else if (DraftLogic.isDirty(d)) {
        state = 'dirty'; text = 'Tersimpan lokal — belum sync'; cls = 'bg-amber-100 text-amber-800';
      } else {
        state = 'synced'; text = 'Tersync ke server ✓'; cls = 'bg-emerald-100 text-emerald-700';
      }
      ind.setAttribute('data-state', state);
      if (state === 'syncing') {
        ind.innerHTML = '<span class="spin"></span>' + text;
      } else {
        ind.textContent = text;
      }
      ind.className = (state === 'idle' ? 'hidden ' : '') + 'text-xs font-medium px-2.5 py-1.5 rounded-full ' + cls;
    }

    function showRecordError(msg) {
      el('record-error').textContent = msg;
      el('record-error').classList.toggle('hidden', !msg);
      if (msg) UiFx.replayAnim(el('record-error'), 'anim-in');
    }

    // ==== SIMPAN MANUAL & KELUAR ====

    el('record-save').addEventListener('click', function manualSave() {
      var d = Q.draft;
      if (!d) return;
      UiFx.btnBusy(el('record-save'), true, 'Menyimpan…');
      if (Q.inFlight) { setTimeout(manualSave, 800); return; }
      clearTimeout(Q.debounceTimer);
      showRecordError('');
      if (!DraftLogic.isDirty(d)) {
        UiFx.btnBusy(el('record-save'), false);
        enterDashboard();
        return;
      }
      DraftStore.put(d)
        .then(function () { return attemptSync(); })
        .then(function (ok) {
          UiFx.btnBusy(el('record-save'), false);
          if (ok) enterDashboard();
          else if (el('record-error').classList.contains('hidden')) {
            showRecordError('Belum bisa terhubung ke server — perubahan aman tersimpan lokal dan akan disync otomatis.');
          }
        });
    });

    el('record-back').addEventListener('click', function () {
      var d = Q.draft;
      clearTimeout(Q.debounceTimer);
      // Mode lihat saja: tidak ada yang perlu disimpan — langsung kembali,
      // jangan sampai draft milik PML lain masuk IndexedDB lewat dialog keluar.
      if (!d || d.owned === false || !DraftLogic.isDirty(d)) { enterDashboard(); return; }
      // Pastikan versi terakhir tersimpan lokal sebelum user memutuskan.
      DraftStore.put(d);
      UiFx.openDialog(el('exit-dialog'));
    });

    el('exit-cancel').addEventListener('click', function () {
      UiFx.closeDialog(el('exit-dialog'));
    });

    // Mode lihat saja: sentuhan di area kuesioner yang inert jatuh ke wrapper
    // layout (bukan ke input) — beri umpan balik kenapa isian "tidak bereaksi",
    // supaya tidak dikira aplikasi hang. TOC tetap interaktif, jangan disela.
    el('record-layout').addEventListener('click', function (ev) {
      if (!(Q.draft && Q.draft.owned === false)) return;
      if (ev.target.closest && ev.target.closest('#toc-panel')) return;
      UiFx.toast('Mode lihat saja — record milik PML lain, isian tidak bisa diubah.');
    });

    el('exit-save').addEventListener('click', function () {
      UiFx.closeDialog(el('exit-dialog'));
      var d = Q.draft;
      // Sync di background dengan referensi draft sendiri (Q.draft segera
      // di-null-kan oleh enterDashboard). Gagal pun data aman di IndexedDB.
      DraftStore.put(d).then(function () { syncDraftInBackground(d); });
      enterDashboard();
    });

    function syncDraftInBackground(d) {
      var sentRev = d.rev;
      gsRun('saveDraft', App.state.pml.email, {
        record_id: d.record_id, jenis: d.jenis, idsubsls: d.idsubsls, answers: d.answers
      })
        .then(function (res) {
          if (!(res && res.ok)) return;
          DraftLogic.markSynced(d, sentRev, res.record_id, res.updated_at);
          return DraftStore.put(d).then(function () {
            // Badge "belum sync" di dashboard jadi basi → segarkan daftarnya.
            if (!el('view-dashboard').classList.contains('hidden')) loadRecords();
          });
        })
        .catch(function () { /* tetap dirty di IndexedDB; disync lagi saat dibuka */ });
    }

    el('exit-discard').addEventListener('click', function () {
      UiFx.closeDialog(el('exit-dialog'));
      var d = Q.draft;
      DraftStore.remove(d.localId).then(function () { enterDashboard(); });
    });

    // ==== HAPUS RECORD (server + salinan lokal, dengan konfirmasi) ====

    // Bersihkan SEMUA salinan lokal record ini. Record yang dibuka dari server
    // punya localId = record_id, sementara draft asal pembuatannya tersimpan
    // dengan kunci 'L-…' — dua-duanya harus hilang, kalau tidak kartu "hantu"
    // muncul lagi di dashboard dari IndexedDB.
    function removeDraftEverywhere(d) {
      return DraftStore.getAll(App.state.pml.email).then(function (drafts) {
        var targets = (drafts || []).filter(function (x) {
          return x.localId === d.localId || (d.record_id && x.record_id === d.record_id);
        });
        if (!targets.length) return DraftStore.remove(d.localId);
        return Promise.all(targets.map(function (x) { return DraftStore.remove(x.localId); }));
      });
    }

    el('record-delete').addEventListener('click', function () {
      UiFx.openDialog(el('delete-dialog'));
    });
    el('delete-cancel').addEventListener('click', function () {
      UiFx.closeDialog(el('delete-dialog'));
    });

    el('delete-confirm').addEventListener('click', function doDelete() {
      var d = Q.draft;
      if (!d) return;
      UiFx.closeDialog(el('delete-dialog'));
      showLoading('Menghapus record…');
      // Tunggu sync yang sedang jalan selesai dulu — kalau tidak, respons
      // saveDraft yang telat bisa menghidupkan lagi record yang baru dihapus.
      if (Q.inFlight) { setTimeout(doDelete, 400); return; }
      stopSyncTimers();
      var serverP = d.record_id
        ? gsRun('deleteRecord', App.state.pml.email, d.record_id)
        : Promise.resolve({ ok: true }); // draft lokal murni: tak ada baris server
      serverP
        .then(function (res) {
          // NOT_FOUND = sudah tidak ada di server — teruskan hapus lokal.
          if (!(res && (res.ok || res.error === 'NOT_FOUND'))) {
            hideLoading();
            showRecordError(SAVE_ERROR_MESSAGES[res && res.error] || 'Gagal menghapus record di server.');
            return;
          }
          return removeDraftEverywhere(d).then(function () {
            hideLoading();
            UiFx.toast('Record dihapus.');
            enterDashboard();
          });
        })
        .catch(function () {
          hideLoading();
          showRecordError('Menghapus butuh koneksi ke server — data tidak diubah. Coba lagi saat online.');
        });
    });

    // ==== SUBMIT & DAFTAR ANOMALI ====
    // Dua hal BERBEDA: validasi isian (required, blocking, tunjuk field) vs
    // rule anomali (jalan SETELAH submit, laporan, tidak memblokir).

    function renderStatusChip() {
      var chip = el('record-status-chip');
      var st = (Q.draft && Q.draft.status) || 'draft';
      chip.textContent = st;
      // draft = amber, submitted = emerald (identik dengan badge dashboard;
      // amber/orange dihindari untuk submitted supaya tak rancu tema orange).
      chip.className = 'text-xs font-semibold px-2 py-1 rounded-full ' +
        (st === 'draft' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700');
    }

    var SEVERITY_CLS = {
      error: 'bg-red-100 text-red-700',
      warning: 'bg-amber-100 text-amber-800'
    };

    // Nilai jawaban untuk baris field anomali — angka diformat id-ID, rasio
    // dibulatkan 4 desimal supaya 0.5714285714 tidak memenuhi layar.
    function fmtAnswer(v) {
      if (v === null || v === undefined || v === '') return '(kosong)';
      if (typeof v === 'number' && isFinite(v)) {
        return (Math.round(v * 10000) / 10000).toLocaleString('id-ID', { maximumFractionDigits: 4 });
      }
      return String(v);
    }

    // Highlight sesaat pakai outline — BUKAN ring, karena ring dipakai penanda
    // field wajib kosong (renderMissing) dan penghapusannya bakal saling timpa.
    var FLASH_CLS = ['outline', 'outline-2', 'outline-orange-500', 'outline-offset-2'];
    function flashField(node) {
      FLASH_CLS.forEach(function (c) { node.classList.add(c); });
      // 3 detik: smooth scroll jarak jauh (roster panjang) bisa makan 1-2,5
      // detik sendiri — flash harus masih terlihat begitu field-nya sampai.
      setTimeout(function () {
        FLASH_CLS.forEach(function (c) { node.classList.remove(c); });
      }, 3000);
    }

    // Klik entri field anomali → tutup dialog anomali (kalau terbuka), scroll
    // ke input pertanyaannya di kuesioner, lalu flash. Field computed tidak
    // pernah dirender di kuesioner — tidak ada target scroll.
    function scrollToAnomalyField(f) {
      if (f.computed) {
        UiFx.toast('Variabel hasil hitungan — tidak ada isian di kuesioner.');
        return;
      }
      // Baris roster bisa sedang dilipat — buka lewat toggle supaya chevron ikut.
      if (f.roster_group && f.row_index != null) {
        var body = document.querySelector('[data-testid="roster-body-' + f.roster_group + '-' + f.row_index + '"]');
        if (body && body.classList.contains('hidden')) {
          var tgl = document.querySelector('[data-testid="roster-toggle-' + f.roster_group + '-' + f.row_index + '"]');
          if (tgl) tgl.click();
        }
      }
      var suffix = f.row_index != null ? '-' + f.row_index : '';
      var target = document.querySelector('#view-record [data-testid="q-' + f.field + suffix + '"]') ||
        document.getElementById('qanchor-' + f.field);
      if (!target) {
        UiFx.toast('Field tidak ditemukan di kuesioner (mungkin pertanyaan sudah nonaktif).');
        return;
      }
      var dlg = el('anomaly-dialog');
      if (!dlg.classList.contains('hidden')) UiFx.closeDialog(dlg);
      if (target.scrollIntoView) target.scrollIntoView({ block: 'center', behavior: 'smooth' });
      flashField(target);
    }

    // Baris "field pemicu": label + kode + konteks baris roster, jawaban di
    // kanan. Tersimpan sebagai snapshot di anomali (diisi server saat submit).
    function anomalyFieldEntry(f) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('data-testid', 'anomaly-field');
      btn.className = 'w-full flex items-center justify-between gap-2 text-left rounded-lg border border-slate-200 bg-slate-50 px-2.5 py-1.5 min-h-[44px] active:bg-orange-50';
      var left = document.createElement('span');
      left.className = 'min-w-0';
      var name = document.createElement('span');
      name.className = 'block text-xs font-medium text-slate-700 leading-snug';
      name.textContent = (f.label || f.field) + (f.roster_group && f.row_index != null
        ? ' — ' + rosterTitle(f.roster_group) + ' #' + (f.row_index + 1) : '');
      var code = document.createElement('span');
      code.className = 'block font-mono text-[11px] text-slate-400';
      code.textContent = f.field + (f.computed ? ' · hasil hitungan' : '');
      left.appendChild(name);
      left.appendChild(code);
      var right = document.createElement('span');
      right.className = 'shrink-0 max-w-[45%] flex items-center gap-1.5';
      var val = document.createElement('span');
      val.setAttribute('data-testid', 'anomaly-field-value');
      val.className = 'text-sm font-semibold text-slate-800 truncate';
      val.textContent = f.display || fmtAnswer(f.value);
      right.appendChild(val);
      if (!f.computed) {
        var arrow = document.createElement('span');
        arrow.className = 'text-slate-400';
        arrow.textContent = '›'; // › — penanda bisa diklik menuju field
        right.appendChild(arrow);
      }
      btn.appendChild(left);
      btn.appendChild(right);
      btn.addEventListener('click', function () { scrollToAnomalyField(f); });
      return btn;
    }

    function renderAnomalyList(listEl, anomalies) {
      listEl.innerHTML = '';
      (anomalies || []).forEach(function (a) {
        var li = document.createElement('li');
        li.setAttribute('data-testid', 'anomaly-item');
        li.className = 'rounded-lg border border-slate-200 bg-white p-3 space-y-2';
        var head = document.createElement('div');
        head.className = 'flex items-start gap-2';
        var badge = document.createElement('span');
        badge.className = 'shrink-0 text-xs font-semibold px-2 py-0.5 rounded-full ' +
          (SEVERITY_CLS[a.severity] || SEVERITY_CLS.warning);
        badge.textContent = a.rule_id + ' · ' + a.severity;
        var msg = document.createElement('p');
        msg.className = 'text-sm';
        msg.textContent = a.message;
        head.appendChild(badge);
        head.appendChild(msg);
        li.appendChild(head);
        // Record lama (submit sebelum fitur ini) belum punya `fields` —
        // tampil seperti dulu, lengkap lagi setelah disubmit ulang.
        if (a.fields && a.fields.length) {
          var fwrap = document.createElement('div');
          fwrap.className = 'space-y-1.5';
          a.fields.forEach(function (f) { fwrap.appendChild(anomalyFieldEntry(f)); });
          li.appendChild(fwrap);
        }
        listEl.appendChild(li);
      });
      UiFx.staggerIn(listEl.children, 50);
    }

    // Panel "hasil pemeriksaan terakhir" — tampil saat membuka record submitted.
    function renderInlineAnomalies() {
      var d = Q.draft;
      var show = !!(d && d.status === 'submitted');
      el('anomaly-section').classList.toggle('hidden', !show);
      if (!show) return;
      var n = (d.anomalies || []).length;
      el('anomaly-section-title').textContent = n
        ? 'Hasil pemeriksaan terakhir: ' + n + ' anomali'
        : 'Hasil pemeriksaan terakhir: tidak ada anomali ✓';
      renderAnomalyList(el('anomaly-list-inline'), d.anomalies);
    }

    function openAnomalyDialog(anomalies) {
      el('anomaly-dialog-count').textContent = anomalies.length
        ? anomalies.length + ' anomali terdeteksi. Anomali bersifat laporan — record sudah tersubmit, bisa diperbaiki lalu disubmit ulang.'
        : 'Tidak ada anomali terdeteksi. Record tersubmit. ✓';
      renderAnomalyList(el('anomaly-dialog-list'), anomalies);
      UiFx.openDialog(el('anomaly-dialog'));
    }

    el('anomaly-done').addEventListener('click', function () {
      UiFx.closeDialog(el('anomaly-dialog'));
      enterDashboard();
    });
    el('anomaly-close').addEventListener('click', function () {
      UiFx.closeDialog(el('anomaly-dialog'));
    });

    var MISSING_INPUT_CLS = ['ring-2', 'ring-red-400', 'border-red-400'];

    function clearMissing() {
      el('missing-summary').classList.add('hidden');
      el('missing-list').innerHTML = '';
      document.querySelectorAll('#view-record [aria-invalid="true"]').forEach(function (n) {
        n.removeAttribute('aria-invalid');
        MISSING_INPUT_CLS.forEach(function (c) { n.classList.remove(c); });
      });
    }

    // Tunjuk field kurang: ringkasan berlabel + tandai inputnya + scroll ke sana.
    function renderMissing(missing) {
      var list = el('missing-list');
      list.innerHTML = '';
      var firstInput = null;
      missing.forEach(function (m) {
        var li = document.createElement('li');
        li.setAttribute('data-testid', 'missing-item');
        li.textContent = m.label + (m.row_index != null && m.roster_group
          ? ' — ' + rosterTitle(m.roster_group) + ' #' + (m.row_index + 1) : '');
        list.appendChild(li);
        if (m.question_id === '__wilayah__') return; // tak ada satu input tunggal
        var testid = 'q-' + m.question_id + (m.row_index != null ? '-' + m.row_index : '');
        var input = document.querySelector('#view-record [data-testid="' + testid + '"]');
        if (input) {
          input.setAttribute('aria-invalid', 'true');
          MISSING_INPUT_CLS.forEach(function (c) { input.classList.add(c); });
          if (!firstInput) firstInput = input;
        }
      });
      el('missing-summary').classList.remove('hidden');
      UiFx.replayAnim(el('missing-summary'), 'anim-in');
      var target = firstInput || el('missing-summary');
      if (target.scrollIntoView) target.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }

    function setSubmitBusy(busy) {
      UiFx.btnBusy(el('record-submit'), busy, 'Memeriksa…');
    }

    el('record-submit').addEventListener('click', function doSubmit() {
      var d = Q.draft;
      if (!d) return;
      setSubmitBusy(true); // busy sejak klik, termasuk saat menunggu sync jalan
      if (Q.inFlight) { setTimeout(doSubmit, 800); return; } // tunggu sync jalan selesai
      clearTimeout(Q.debounceTimer);
      showRecordError('');
      clearMissing();
      setSubmitBusy(true);
      Q.inFlight = true; // blokir auto-sync selama submit
      var sentRev = d.rev;
      DraftStore.put(d)
        .then(function () {
          // Submit membawa jawaban lokal terakhir — record yang belum pernah
          // sync (dibuat offline) pun bisa langsung disubmit saat online.
          return gsRun('submitRecord', App.state.pml.email, {
            record_id: d.record_id, jenis: d.jenis, idsubsls: d.idsubsls, answers: d.answers
          });
        })
        .then(function (res) {
          Q.inFlight = false;
          setSubmitBusy(false);
          if (!(res && res.ok)) {
            showRecordError(SAVE_ERROR_MESSAGES[res && res.error] || 'Gagal submit ke server.');
            return;
          }
          // Jawaban tersimpan di server walau validasi menolak submit.
          DraftLogic.markSynced(d, sentRev, res.record_id, res.updated_at);
          if (res.submitted === false) {
            DraftStore.put(d);
            refreshSyncIndicator();
            renderMissing(res.missing || []);
            return;
          }
          d.status = 'submitted';
          d.anomalies = res.anomalies || [];
          DraftStore.put(d);
          refreshSyncIndicator();
          renderStatusChip();
          renderInlineAnomalies();
          openAnomalyDialog(d.anomalies);
        })
        .catch(function () {
          Q.inFlight = false;
          setSubmitBusy(false);
          showRecordError('Submit butuh koneksi ke server. Perubahan aman tersimpan lokal dan bisa disubmit lagi nanti.');
        });
    });

    // ==== DASHBOARD VISUALISASI (halaman awal — markup di VizView, logic
    // agregasi murni di VizLogic; di sini hanya render & wiring event) ====

    var Viz = {
      data: null,      // { records, questions: {usaha, keluarga} } dari getDashboardData
      loaded: false,
      loading: false,
      jenis: 'usaha',
      // answers = filter nilai jawaban hasil klik bar/bin chart (chips);
      // tiap item punya `label` untuk teks chip — identitas toggle-nya
      // VizLogic.sameAnswerFilter (label diabaikan).
      filters: { kdkec: '', kddesa: '', kdsls: '', pml: '', ppl: '', anomali: '', includeDraft: false, answers: [] },
      openTab: {},     // question_id -> dim tabulasi yang panelnya terbuka
      kbliFetching: false // guard fetch daftar judul KBLI (sekali per sesi)
    };

    function vizFilters() {
      var f = Viz.filters;
      return {
        jenis: Viz.jenis, includeDraft: f.includeDraft,
        kdkec: f.kdkec, kddesa: f.kddesa, kdsls: f.kdsls, pml: f.pml, ppl: f.ppl,
        anomali: f.anomali, answers: f.answers
      };
    }

    // Crossfilter: kartu TIDAK disaring oleh filter nilai pada pertanyaannya
    // SENDIRI (eq/empty/range) supaya opsi lain tetap terlihat & bisa
    // di-toggle. Kekecualian: filter kategori KBLI (kind 'kat') tetap
    // berlaku di kartunya — dia memang mempersempit fokus kartu itu.
    function cardRecordsFor(q) {
      var f = vizFilters();
      f.answers = (f.answers || []).filter(function (a) {
        return a.qid !== q.question_id || a.kind === 'kat';
      });
      return VizLogic.filterRecords(Viz.data.records, f);
    }

    function isAnswerFilterActive(flt) {
      return (Viz.filters.answers || []).some(function (a) {
        return VizLogic.sameAnswerFilter(a, flt);
      });
    }
    function toggleAnswerFilter(flt) {
      var arr = Viz.filters.answers;
      for (var i = 0; i < arr.length; i++) {
        if (VizLogic.sameAnswerFilter(arr[i], flt)) {
          arr.splice(i, 1);
          renderViz();
          return;
        }
      }
      arr.push(flt);
      renderViz();
    }

    function renderAnswerChips() {
      var box = el('viz-answer-chips');
      var arr = Viz.filters.answers || [];
      box.innerHTML = '';
      box.classList.toggle('hidden', !arr.length);
      if (!arr.length) return;
      arr.forEach(function (flt) {
        var chip = document.createElement('button');
        chip.type = 'button';
        chip.setAttribute('data-testid', 'viz-chip');
        chip.title = 'Hapus filter ini';
        chip.className = 'inline-flex items-center gap-1.5 max-w-full h-8 px-2.5 rounded-full bg-orange-100 text-orange-800 text-xs font-medium active:bg-orange-200';
        var t = document.createElement('span');
        t.className = 'truncate max-w-[16rem]';
        t.textContent = flt.label || flt.qid;
        var x = document.createElement('span');
        x.className = 'font-bold shrink-0';
        x.textContent = '×';
        chip.appendChild(t);
        chip.appendChild(x);
        chip.addEventListener('click', function () { toggleAnswerFilter(flt); });
        box.appendChild(chip);
      });
      var clear = document.createElement('button');
      clear.type = 'button';
      clear.setAttribute('data-testid', 'viz-chip-clear');
      clear.className = 'h-8 px-2 text-xs font-medium text-slate-500 active:text-orange-700';
      clear.textContent = 'Hapus semua';
      clear.addEventListener('click', function () {
        Viz.filters.answers = [];
        renderViz();
      });
      box.appendChild(clear);
    }

    function updateVizAuthButton() {
      el('goto-app-btn').textContent = App.state.pml ? 'Lembar Kerja' : 'Masuk';
    }

    function enterViz() {
      updateVizAuthButton();
      showView('viz');
      // Selalu refetch saat masuk (data bisa berubah oleh PML lain / submit
      // barusan); render lama ditahan redup selama refetch — tanpa skeleton.
      if (!Viz.loading) loadVizData();
    }

    function loadVizData() {
      Viz.loading = true;
      el('viz-error').classList.add('hidden');
      if (!Viz.loaded) {
        el('viz-loading').classList.remove('hidden');
        el('viz-tiles').innerHTML = '';
        el('viz-cards').innerHTML = '';
      } else {
        el('viz-cards').classList.add('busy-dim');
      }
      gsRun('getDashboardData')
        .then(function (res) {
          vizLoadDone();
          if (!(res && res.ok)) { showVizError(); return; }
          Viz.data = {
            records: res.records || [],
            questions: res.questions || { usaha: [], keluarga: [] }
          };
          Viz.loaded = true;
          renderViz();
        })
        .catch(function () {
          vizLoadDone();
          showVizError();
        });
    }
    function vizLoadDone() {
      Viz.loading = false;
      el('viz-loading').classList.add('hidden');
      el('viz-cards').classList.remove('busy-dim');
    }
    function showVizError() {
      // Refetch gagal saat data lama masih tampil → cukup toast, frame bertahan.
      if (Viz.loaded) { UiFx.toast('Gagal memuat ulang data dashboard.'); return; }
      el('viz-error').classList.remove('hidden');
    }

    function vizFmtNum(n, dec) {
      if (n === null || n === undefined || !isFinite(n)) return '—';
      return Number(n).toLocaleString('id-ID', { maximumFractionDigits: dec === undefined ? 2 : dec });
    }
    function vizPct(part, total) { return total > 0 ? Math.round((part / total) * 100) : 0; }

    // ---- filter row ----

    function vizRebuildSelect(id, list, keep, allLabel, labelFn) {
      var sel = el(id);
      sel.innerHTML = '';
      sel.appendChild(new Option(allLabel, ''));
      list.forEach(function (o) { sel.appendChild(new Option(labelFn(o), o.kode)); });
      if (keep && list.some(function (o) { return o.kode === keep; })) sel.value = keep;
      return sel.value; // '' kalau pilihan lama sudah tidak tersedia
    }
    function vizWilayahLabel(o) { return '[' + o.kode + '] ' + o.nama; }
    function vizNamaLabel(o) { return o.nama; }

    // Opsi tiap select diisi dari record se-scope dan bertingkat. Kalau nilai
    // terpilih hilang dari opsi (mis. setelah muat ulang data), nilai itu +
    // turunannya direset lalu opsi dihitung ulang supaya tidak menyaring
    // dengan nilai hantu.
    function renderVizFilters() {
      var f = Viz.filters;
      var opts = VizLogic.filterOptions(Viz.data.records, vizFilters());
      var kec = vizRebuildSelect('viz-filter-kec', opts.kec, f.kdkec, 'Semua Kecamatan', vizWilayahLabel);
      if (kec !== f.kdkec) {
        f.kdkec = kec; f.kddesa = ''; f.kdsls = '';
        opts = VizLogic.filterOptions(Viz.data.records, vizFilters());
      }
      var desa = vizRebuildSelect('viz-filter-desa', opts.desa, f.kddesa, 'Semua Desa', vizWilayahLabel);
      if (desa !== f.kddesa) {
        f.kddesa = desa; f.kdsls = '';
        opts = VizLogic.filterOptions(Viz.data.records, vizFilters());
      }
      var sls = vizRebuildSelect('viz-filter-sls', opts.sls, f.kdsls, 'Semua SLS', vizWilayahLabel);
      if (sls !== f.kdsls) {
        f.kdsls = sls;
        opts = VizLogic.filterOptions(Viz.data.records, vizFilters());
      }
      f.pml = vizRebuildSelect('viz-filter-pml', opts.pml, f.pml, 'Semua PML', vizNamaLabel);
      f.ppl = vizRebuildSelect('viz-filter-ppl', opts.ppl, f.ppl, 'Semua PPL', vizNamaLabel);
      f.anomali = vizRebuildAnomaliSelect(opts.anomali, f.anomali);
      el('viz-include-draft').checked = f.includeDraft;
    }

    // Select anomali punya 2 opsi tetap ("Ada"/"Tidak ada") di atas daftar
    // rule yang benar-benar muncul di data. Label opsi rule = rule_id + judul
    // anomali (bagian message sebelum ':'); message penuh di title opsi.
    function vizRebuildAnomaliSelect(list, keep) {
      var sel = el('viz-filter-anomali');
      sel.innerHTML = '';
      sel.appendChild(new Option('Semua Anomali', ''));
      sel.appendChild(new Option('Ada anomali', '__any__'));
      sel.appendChild(new Option('Tidak ada anomali', '__none__'));
      (list || []).forEach(function (o) {
        var judul = o.nama.indexOf(':') !== -1 ? o.nama.slice(0, o.nama.indexOf(':')) : o.nama;
        var opt = new Option(o.kode + ' — ' + judul, o.kode);
        opt.title = o.nama;
        sel.appendChild(opt);
      });
      if (keep === '__any__' || keep === '__none__' ||
          (list || []).some(function (o) { return o.kode === keep; })) {
        sel.value = keep;
      }
      return sel.value;
    }

    // ---- render utama ----

    function renderViz() {
      if (!Viz.loaded) return;
      renderVizFilters();
      renderAnswerChips();
      var slice = VizLogic.filterRecords(Viz.data.records, vizFilters());
      renderVizTiles();
      var cards = el('viz-cards');
      cards.innerHTML = '';
      el('viz-empty').classList.toggle('hidden', slice.length > 0);
      if (!slice.length) return;
      (Viz.data.questions[Viz.jenis] || []).forEach(function (q) {
        cards.appendChild(vizCard(q));
      });
      UiFx.staggerIn(cards.children, 20);
    }

    function vizTile(label, value, testid) {
      var d = document.createElement('div');
      d.className = 'bg-white rounded-xl shadow-sm p-3';
      var l = document.createElement('p');
      l.className = 'text-xs text-slate-500';
      l.textContent = label;
      var v = document.createElement('p');
      v.className = 'text-2xl font-semibold text-slate-800 mt-0.5';
      v.textContent = value;
      v.setAttribute('data-testid', testid);
      d.appendChild(l);
      d.appendChild(v);
      return d;
    }
    function renderVizTiles() {
      var s = VizLogic.summary(Viz.data.records, vizFilters());
      var t = el('viz-tiles');
      t.innerHTML = '';
      t.appendChild(vizTile('Record ' + Viz.jenis, vizFmtNum(s.total, 0), 'viz-tile-total'));
      t.appendChild(vizTile('Submitted', vizFmtNum(s.submitted, 0), 'viz-tile-submitted'));
      t.appendChild(vizTile('Draft', vizFmtNum(s.draft, 0), 'viz-tile-draft'));
      t.appendChild(vizTile('Anomali (submitted)', vizFmtNum(s.anomali, 0), 'viz-tile-anomali'));
    }

    // ---- kartu per butir pertanyaan ----

    function vizCard(q) {
      // Slice khusus kartu (crossfilter, lihat cardRecordsFor).
      var slice = cardRecordsFor(q);
      var card = document.createElement('div');
      // flex-col + mt-auto di seksi tabulasi: kartu sebaris (grid stretch)
      // sama tinggi dengan tombol tabulasi rata di dasar kartu.
      card.className = 'bg-white rounded-xl shadow-sm p-4 flex flex-col';
      card.setAttribute('data-testid', 'viz-card');
      card.setAttribute('data-qid', q.question_id);

      var head = document.createElement('p');
      head.className = 'text-sm font-semibold leading-snug';
      var code = document.createElement('span');
      code.className = 'font-mono font-normal text-xs text-slate-400 mr-1.5 select-all';
      code.textContent = q.question_id;
      head.appendChild(code);
      head.appendChild(document.createTextNode(q.label));
      card.appendChild(head);

      var vals = VizLogic.questionValues(slice, q);
      var unit = q.roster_group
        ? (q.roster_group === 'anggota_keluarga' ? 'baris anggota' : 'baris meteran')
        : 'record';
      var sub = document.createElement('p');
      sub.className = 'text-xs text-slate-400 mt-0.5 mb-2';
      sub.textContent = vizFmtNum(vals.values.length, 0) + ' terisi · ' +
        vizFmtNum(vals.empty, 0) + ' kosong · basis ' + vizFmtNum(vals.rows, 0) + ' ' + unit;
      card.appendChild(sub);

      if (q.type === 'kbli') card.appendChild(vizKbliKategoriRow(q));

      // Area chart ber-max-height (scroll ke dalam) supaya daftar opsi panjang
      // tidak memanjangkan kartu — tinggi kartu sebaris tetap seragam.
      var body = document.createElement('div');
      body.className = 'viz-chart-scroll mb-3';
      if (!vals.rows) {
        var none = document.createElement('p');
        none.className = 'text-xs text-slate-400 py-2';
        none.textContent = 'Belum ada data untuk butir ini.';
        body.appendChild(none);
      } else {
        var kind = VizLogic.chartKind(q);
        body.appendChild(
          kind === 'categorical' ? vizCategoricalChart(q, vals)
            : kind === 'numeric' ? vizNumericChart(q, vals)
              : vizTextChart(q, vals)
        );
      }
      card.appendChild(body);

      card.appendChild(vizTabSection(q, slice));
      return card;
    }

    // Baris kontrol kategori KBLI (khusus kartu r13g): dropdown huruf A-U
    // yang ada di data. Efeknya = filter global kind 'kat' (muncul sebagai
    // chip juga), tapi kontrolnya memang hanya relevan/ditaruh di kartu ini.
    function vizKbliKategoriRow(q) {
      // Opsi kategori dihitung TANPA filter kat aktif supaya daftarnya tidak
      // menciut jadi satu huruf begitu salah satu dipilih.
      var f = vizFilters();
      f.answers = (f.answers || []).filter(function (a) { return a.qid !== q.question_id; });
      var vals = VizLogic.questionValues(VizLogic.filterRecords(Viz.data.records, f), q);
      var counts = {};
      vals.values.forEach(function (v) {
        var k = VizLogic.kbliKategori(v);
        if (k) counts[k] = (counts[k] || 0) + 1;
      });
      var current = '';
      (Viz.filters.answers || []).forEach(function (a) {
        if (a.qid === q.question_id && a.kind === 'kat') current = String(a.value);
      });

      var row = document.createElement('div');
      row.className = 'flex items-center gap-2 mb-2';
      var lbl = document.createElement('label');
      lbl.className = 'text-xs text-slate-500 shrink-0';
      lbl.textContent = 'Kategori KBLI:';
      var sel = document.createElement('select');
      sel.setAttribute('data-testid', 'viz-kbli-kategori');
      // Saat sebuah kategori terpilih (filter menyala) select ikut kontras —
      // senada dengan state .viz-active pada bar.
      sel.className = current
        ? 'h-9 px-2 text-xs rounded-lg border-2 border-orange-600 bg-orange-100 text-orange-900 font-semibold min-w-0'
        : 'h-9 px-2 text-xs rounded-lg border border-slate-300 bg-white min-w-0';
      sel.appendChild(new Option('Semua kategori', ''));
      Object.keys(counts).sort().forEach(function (k) {
        sel.appendChild(new Option(k + ' (' + counts[k] + ')', k));
      });
      sel.value = current;
      sel.addEventListener('change', function () {
        Viz.filters.answers = (Viz.filters.answers || []).filter(function (a) {
          return !(a.qid === q.question_id && a.kind === 'kat');
        });
        if (sel.value) {
          Viz.filters.answers.push({
            qid: q.question_id, roster_group: q.roster_group || '',
            kind: 'kat', value: sel.value,
            label: q.question_id + ' kategori ' + sel.value
          });
        }
        renderViz();
      });
      row.appendChild(lbl);
      row.appendChild(sel);
      return row;
    }

    /**
     * Satu baris bar horizontal: label | bar | angka di ujung (direct label).
     * opts = { label, count, max, total, muted, tipExtra, filter }
     * muted=true untuk kategori de-emphasis "Tidak diisi"; filter (kalau ada)
     * membuat baris bisa diklik untuk toggle filter nilai (chips), dengan
     * state aktif ditandai .viz-active.
     */
    function vizBarRow(opts) {
      var row = document.createElement('div');
      row.className = 'viz-row flex items-center gap-2 min-h-[22px] px-1 -mx-1';
      var tip = vizFmtNum(opts.count, 0) + ' (' + vizPct(opts.count, opts.total) + '%) — ' + opts.label;
      if (opts.tipExtra) tip += '\n' + opts.tipExtra;
      if (opts.filter) tip += '\nKlik untuk jadikan filter';
      row.setAttribute('data-tip', tip);
      var l = document.createElement('span');
      l.className = 'w-32 sm:w-44 shrink-0 text-xs text-slate-600 truncate';
      l.textContent = opts.label;
      var track = document.createElement('div');
      track.className = 'flex-1 min-w-0';
      var bar = document.createElement('div');
      bar.className = 'viz-bar' + (opts.muted ? ' viz-bar-muted' : '');
      if (opts.count > 0 && opts.max > 0) {
        bar.style.width = Math.max(2, Math.round((opts.count / opts.max) * 100)) + '%';
      } else {
        bar.style.width = '0';
        bar.style.minWidth = '0';
      }
      track.appendChild(bar);
      var c = document.createElement('span');
      c.className = 'viz-num text-xs text-slate-700 w-10 text-right shrink-0';
      c.textContent = vizFmtNum(opts.count, 0);
      row.appendChild(l);
      row.appendChild(track);
      row.appendChild(c);
      if (opts.filter) {
        row.setAttribute('data-filterable', '1');
        if (isAnswerFilterActive(opts.filter)) row.classList.add('viz-active');
        row.addEventListener('click', function () { toggleAnswerFilter(opts.filter); });
      }
      return row;
    }

    function emptyFilterFor(q) {
      return {
        qid: q.question_id, roster_group: q.roster_group || '', kind: 'empty',
        label: q.question_id + ' tidak diisi'
      };
    }

    // Kategorik: bar per opsi MENGIKUTI urutan opsi (kode ordinal — jangan
    // diurutkan ulang berdasar count), + "Lainnya" & "Tidak diisi" bila ada.
    // Tiap opsi bisa diklik jadi filter; "Lainnya" tidak (nilainya campuran).
    function vizCategoricalChart(q, vals) {
      var oc = VizLogic.optionCounts(vals.values, q.options);
      var rows = oc.items.map(function (it) {
        return {
          label: it.key + '. ' + it.label, count: it.count, muted: false,
          filter: {
            qid: q.question_id, roster_group: q.roster_group || '', kind: 'eq', value: it.key,
            label: q.question_id + ' = ' + it.key + '. ' + it.label
          }
        };
      });
      if (oc.other > 0) rows.push({ label: 'Lainnya', count: oc.other, muted: false, filter: null });
      if (vals.empty > 0) rows.push({ label: 'Tidak diisi', count: vals.empty, muted: true, filter: emptyFilterFor(q) });
      var max = 0;
      rows.forEach(function (r) { if (r.count > max) max = r.count; });
      var wrap = document.createElement('div');
      wrap.className = 'space-y-1';
      rows.forEach(function (r) {
        wrap.appendChild(vizBarRow({ label: r.label, count: r.count, max: max, total: vals.rows, muted: r.muted, filter: r.filter }));
      });
      return wrap;
    }

    // Numerik: histogram bin cantik + ringkasan statistik. Tiap bin bisa
    // di-hover (tooltip rentang: jumlah) dan diklik jadi filter rentang.
    function vizNumericChart(q, vals) {
      var nums = VizLogic.toNumbers(vals.values);
      var wrap = document.createElement('div');
      if (!nums.length) {
        var p = document.createElement('p');
        p.className = 'text-xs text-slate-400 py-2';
        p.textContent = 'Belum ada isian angka.';
        wrap.appendChild(p);
        return wrap;
      }
      var stats = VizLogic.numericStats(nums);
      var h = VizLogic.histogram(nums, 8);
      var dec = h.step > 0 && h.step < 1 ? 2 : 0;

      var plot = document.createElement('div');
      plot.className = 'viz-plot flex items-end gap-[2px] h-24';
      var maxCount = 0, maxBin = h.bins[0];
      h.bins.forEach(function (b) { if (b.count > maxCount) { maxCount = b.count; maxBin = b; } });
      h.bins.forEach(function (b, i) {
        var isLast = i === h.bins.length - 1;
        var range = b.x0 === b.x1
          ? vizFmtNum(b.x0, dec)
          : vizFmtNum(b.x0, dec) + '–' + vizFmtNum(b.x1, dec);
        var flt = {
          qid: q.question_id, roster_group: q.roster_group || '',
          kind: 'range', x0: b.x0, x1: b.x1, incMax: isLast || b.x0 === b.x1,
          label: q.question_id + ': ' + range
        };
        var cw = document.createElement('div');
        cw.className = 'viz-colwrap flex-1 h-full flex items-end min-w-0';
        cw.setAttribute('data-tip', vizFmtNum(b.count, 0) + ' (' + vizPct(b.count, stats.n) + '%) — ' + range + '\nKlik untuk jadikan filter');
        cw.setAttribute('data-filterable', '1');
