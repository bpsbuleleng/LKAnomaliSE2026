<section id="admin-view-login" data-testid="admin-login-view" class="view max-w-md mx-auto px-4 py-10">
  <div class="bg-white rounded-2xl shadow p-6 space-y-4">
    <h1 class="text-xl font-bold">Kelola Pertanyaan &amp; Rule</h1>
    <p class="text-sm text-slate-500">
      Halaman khusus admin BPS Kabupaten Buleleng. Masukkan password admin
      untuk melanjutkan.
    </p>
    <form id="admin-login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1" for="admin-password">Password admin</label>
        <input id="admin-password" data-testid="admin-password" type="password" autocomplete="off"
          class="w-full h-12 px-3 text-base rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-sky-500">
      </div>
      <p id="admin-login-error" data-testid="admin-login-error" class="hidden text-sm text-red-600"></p>
      <button id="admin-login-submit" data-testid="admin-login-submit" type="submit"
        class="w-full h-12 rounded-xl bg-sky-600 text-white text-base font-semibold active:bg-sky-700 disabled:opacity-50">
        Masuk
      </button>
    </form>
  </div>
</section>
